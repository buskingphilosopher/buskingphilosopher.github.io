<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocab Mirabilis</title>

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #f5f3ef;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }


    /* ─────────────────────────────────────
       TAB SWITCHER
       Sits at the very top of the stage,
       letting you switch between lists.
    ───────────────────────────────────── */

    .tab-bar {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 18px 20px 0;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      flex-wrap: wrap;
    }

    .tab {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-family: -apple-system, sans-serif;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .tab:hover {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .tab.active {
      background: white;
      color: #1a1a1a;
      border-color: white;
      font-weight: 500;
    }


    /* ─────────────────────────────────────
       STAGE — full screen, colour changes
       per active list
    ───────────────────────────────────── */

    .stage {
      color: white;
      flex: 0 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 30px 40px;
      text-align: center;
      cursor: pointer;
      position: relative;
      user-select: none;
      transition: background-color 0.5s ease;
    }

    .stage-hint {
      position: absolute;
      top: 72px;        /* sits just below the tab bar */
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #display-type {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 14px;
      font-family: -apple-system, sans-serif;
      min-height: 16px;
    }

    #display-word {
      font-size: clamp(32px, 8vw, 64px);
      font-weight: normal;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
    }

    #display-definition {
      font-size: 16px;
      font-style: italic;
      color: rgba(255,255,255,0.6);
      max-width: 400px;
      line-height: 1.65;
    }

    #display-example {
      font-size: 14px;
      font-style: italic;
      color: rgba(255,255,255,0.32);
      max-width: 400px;
      line-height: 1.65;
      margin-top: 14px;
    }

    .stage-footer {
      position: absolute;
      bottom: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      font-family: -apple-system, sans-serif;
    }

    /* Fade transition */
    .stage.fading { opacity: 0; transition: opacity 0.2s ease; }
    .stage        { opacity: 1; transition: opacity 0.35s ease, background-color 0.5s ease; }


    /* ─────────────────────────────────────
       WORD LIST
    ───────────────────────────────────── */

    .list-section {
      padding: 32px 20px 60px;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
    }

    .list-section h2 {
      font-size: 13px;
      font-weight: normal;
      color: #bbb;
      margin-bottom: 18px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: -apple-system, sans-serif;
    }

    .word-row {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 13px 16px;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.12s;
    }

    .word-row:hover { border-color: #bbb; }

    .word-row .w {
      font-size: 17px;
      color: #1a1a1a;
      flex-shrink: 0;
    }

    .word-row .t {
      font-size: 11px;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
      font-family: -apple-system, sans-serif;
    }

    .word-row .d {
      font-size: 13px;
      font-style: italic;
      color: #888;
      flex: 1;
      line-height: 1.4;
      min-width: 100%;   /* forces definition onto its own line */
    }

    .word-row .ex {
      font-size: 12px;
      font-style: italic;
      color: #bbb;
      width: 100%;
      line-height: 1.5;
    }

  </style>
</head>

<body>

  <!-- STAGE: full-screen colour block with random word -->
  <div class="stage" id="stage">

    <!-- Tab switcher sits inside the stage so it floats over it -->
    <div class="tab-bar" id="tab-bar"></div>

    <span class="stage-hint" id="stage-hint">✦ vocab mirabilis ✦</span>
    <div id="display-type"></div>
    <div id="display-word"></div>
    <div id="display-definition"></div>
    <div id="display-example"></div>
    <span class="stage-footer">click anywhere for another · scroll down for all words</span>
  </div>


  <!-- WORD LIST: always beige regardless of active list -->
  <div class="list-section">
    <h2 id="list-heading">All Words</h2>
    <div id="word-list"></div>
  </div>


  <script>

    // ═══════════════════════════════════════════
    // LISTS
    //
    // Each list has:
    //   label     — shown on the tab button
    //   color     — the stage background when active
    //   words     — array of word objects
    //
    // To add a new list: copy one list block,
    // give it a new label and color, add your words.
    //
    // To add a word: copy a word block into the
    // relevant list's words array.
    // example is optional — leave it out if you don't have one.
    // ═══════════════════════════════════════════

    const lists = [

      {
        label: "English",
        color: "#1a1a1a",
        words: [
          {
            word: "Obstreperous",
            type: "adjective",
            definition: "Noisy, unruly and difficult to control or manage, often describing defiant behaviour."
          },
          {
            word: "Pusillanimous",
            type: "adjective",
            definition: "Lacking courage, resolution or strength, often acting in a contemptibly timid, cowardly or small-minded manner."
          },
          {
            word: "Susurrous",
            type: "adjective",
            definition: "Describes a soft, whispering, rustling, or murmuring sound, often found in nature like wind through leaves or water lapping."
          },
          {
            word: "Garrulous",
            type: "adjective",
            definition: "Excessively talkative, especially regarding trivial or unimportant matters, often in a rambling or wordy manner."
          },
          {
            word: "Mellifluous",
            type: "adjective",
            definition: "Sweet or musical; pleasant to hear."
          },
          {
            word: "Ebullience",
            type: "noun",
            definition: "High-spirited enthusiasm or energy."
          },
          {
            word: "Obsequious",
            type: "adjective",
            definition: "Excessively eager to please, praise or obey, often in a servile or fawning manner to gain favour."
          },
          {
            word: "Temerarious",
            type: "adjective",
            definition: "Presumptuously daring, recklessly bold, rash, or unreasonably adventurous, describing actions taken with little regard for danger or consequences."
          },
          {
            word: "Vituperative",
            type: "adjective",
            definition: "Harsh, abusive, intensely scathing language, characterised as abusive, vitriolic and castigating."
          },
          {
            word: "Loquacious",
            type: "adjective",
            definition: "excessively talkative, chatty or wordy."
          },
          {
            word: "Phlegmatic",
            type: "adjective",
            definition: "a calm, stoic, and unemotional temperament, representing someone not easily excited, angered, or bothered by stress."
          },
          {
            word: "Avuncular",
            type: "adjective",
            definition: "a person who is friendly, kind, patient, and indulgent, behaving in a manner typical of a stereotypical 'uncle' toward a younger person."
          },
          {
            word: "Transmogrify",
            type: "verb",
            definition: "to transform or change someone or something completely, often into a different, bizarre, or grotesque form as if by magic."
          },
          {
            word: "Nacreous",
            type: "adjective",
            definition: "something with a pearly, lustrous, or iridescent appearance, resembling the inside of a seashell (mother-of-pearl)."
          },
          {
            word: "Vicissitudinous",
            type: "adjective",
            definition: "characterised by constant, unexpected changes, shifts, or ups and downs, particularly in fortune or circumstances."
          },
          {
            word: "Esurient",
            type: "adjective",
            definition: "hungry, greedy or eager for something."
          },
          {
            word: "Exigent",
            type: "adjective",
            definition: "urgent, critical."
          },
        ]
      },

      {
        label: "French",
        color: "#2c4a6e",   /* deep blue — change to any colour you like */
        words: [
          {
            word: "Dépaysement",
            type: "nom masculin",
            definition: "The feeling of being a foreigner; disorientation from being away from home.",
            example: "Elle ressentait un profond dépaysement en arrivant dans cette ville inconnue."
          },
          {
            word: "Soupçon",
            type: "nom masculin",
            definition: "A very small amount; a hint or trace of something."
          },
        ]
      },

      {
        label: "Rhetorical Devices",
        color: "#3d2645",   /* deep purple — change to any colour you like */
        words: [
          {
            word: "Adynaton",
            type: "noun",
            definition: "A declaration of impossibility, usually in terms of an exaggerated comparison. Sometimes, the expression of the impossibility of expression.",
            example: "'I will sooner have a beard grow in the palm of my hand than he shall get one of his cheek' — Shakespeare, 2 Henry IV 1.2.20-22"
          },
          {
            word: "Anacoluthon",
            type: "noun",
            definition: "A grammatical interruption or lack of implied sequence within a sentence.",
            example: "Athletes convicted of drug-related crimes — are they to be forgiven with just a slap on the wrist?"
          },
          {
            word: "Polysyndeton",
            type: "noun",
            definition: "Employing many conjunctions between clauses, often slowing the tempo or rhythm.",
            example: "I said, 'Who killed him?' and he said, 'I don't know who killed him but he's dead all right,' and it was dark and there was water standing in the street and no lights and windows broke and boats all up in the town and trees blown down and everything all blown and I got a skiff and went out and found my boat where I had her inside Mango Key and she was all right only she was full of water. — Hemingway, After the Storm"
          },
          {
            word: "Prosopopoeia",
            type: "noun",
            definition: "Reference to abstractions or inanimate objects as though they had human qualities or abilities (the Greek word for the English 'personification')."
          },
          {
            word: "Pleonasm",
            type: "noun",
            definition: "Use of more words than is necessary semantically. Rhetorical repetition that is grammatically superfluous."
          },
          {
            word: "Prozeugma",
            type: "noun",
            definition: "	A series of clauses in which the verb employed in the first is ellided (and thus implied) in the others.",
            example: "'Lust conquered shame; audacity, fear; madness, reason.' ('Vicit pudorem libido, timorem audacia, rationem amentia') - Cicero"
          },
          {
            word: "Polyptoton",
            type: "noun",
            definition: "Repeating a word, but in a different form (e.g., noun to verb, adjective to adverb). Using a cognate of a given word in close proximity.",
            example: "1. 'I dreamed a dream.' 2. 'Love is not love / Which alters when it alteration finds, / Or bends with the remover to remove.' – Shakespeare, Sonnet 116 3. 'The things you own end up owning you.' 4. 'Not as a call to battle, though embattled we are.' – JFK"
          },
          {
            word: "Inter se pugnantia",
            type: "noun",
            definition: "Using direct address to reprove someone before an audience, pointing out the contradictions in that person's character, often between what a person does and says."
          },
          {
            word: "Anaphora",
            type: "noun",
            definition: "The repetition of a word or phrase at the beginning of successive clauses.",
            example: "'We shall fight on the beaches, we shall fight on the landing grounds, we shall fight in the fields.' – Churchill"
          },
          {
            word: "Chiasmus",
            type: "noun",
            definition: "The reversal of grammatical structures, ideas, or meanings. It covers a broader range of reversals and does not strictly require the same words to be repeated.",
            example: "1. 'It's hard to make time, but to waste it is easy.' 2. 'By day the frolic, and the dance by night.'"
          },
          {
            word: "Synecdoche",
            type: "noun",
            definition: "A figure of speech in which a part represents the whole, or vice versa.",
            example: "All hands on deck."
          },
          {
            word: "Litotes",
            type: "noun",
            definition: "A type of understatement where you express a positive not by affirming it but by negating its opposite.",
            example: "Saying 'Not bad' to mean 'Good,' or 'It's not rocket science' to convey 'It's simple to understand'."
          },
          {
            word: "Anthimeria",
            type: "noun",
            definition: "Where a word is used as a different part of speech than its conventional usage, most commonly transforming a noun into a verb.",
            example: "1. 'Have a good sleep' (verb 'sleep' used as a noun) 2. 'I'm going for a run' 3. 'The poor are often ignored' 4. 'I need to Google that' 5. 'Let me eyeball the results'"
          },
          {
            word: "Asyndeton",
            type: "noun",
            definition: "The deliberate omission of conjunctions (such as 'and' or 'but') between a series of related clauses, often resulting in a hurried rhythm or vehement effect.",
            example: "'I came; I saw; I conquered' ('Veni, vidi, vici') - Ceasar"
          },
          {
            word: "Meiosis",
            type: "noun",
            definition: "A type of understatement where you downplay or diminish in importance, serving to ironically minimise or create a sarcastic, humorous, or euphemistic effect.",
            example: "'My broken leg? It's merely a scratch.'"
          },
          {
            word: "Zeugma",
            type: "noun",
            definition: "When one part of speech (most often the main verb, but sometimes a noun) governs two or more other parts of a sentence (often in a series).",
            example: "'As Virgil guided Dante through Inferno, the Sibyl Aeneas Avernus.' (Through zeugma, 'guided' and 'through' are inferred for Sibyl and Aeneas: 'As Virgil guided Dante through Inferno, the Sibyl [guided] Aeneas [through] Avernus.')"
          },
          {
            word: "Autonomasia",
            type: "noun",
            definition: "Substituting a descriptive phrase for a proper name, or substituting a proper name for a quality associated with it.",
            example: "1. In the TV show 'Dinosaurs' the infant dino called his father 'Not-the-Mama' 2. He proved a Judas to the cause 3. There is much of Cicero in this letter 4. He's no Fabio to look at; but then, he's no Woody Allen, either."
          },
          {
            word: "Prolepsis",
            type: "noun",
            definition: "A figure of anticipation, speaking of something future as though already done or existing.",
            example: "'Oh, I am a dead man!' (Obviously, the speaker refers less to the actuality of the moment as he does to the near future.)"
          },
          {
            word: "Paraprosdokian",
            type: "noun",
            definition: "a figure of speech in which the latter part of a sentence or phrase is unexpected or surprising, forcing the reader to reframe or reinterpret the beginning. Frequently used for humour, satire, or wit, often found in comedy and famous quotes.",
            example: "1. 'I've had a perfectly wonderful evening, but this wasn't it.' — Groucho Marx 2. 'If at first you don't succeed, then skydiving definitely isn't for you.' 3. 'Housework can't kill you, but why take the chance?'"
          },
          {
            word: "Antiprosopopoeia",
            type: "noun",
            definition: "The representation of persons as inanimate objects (the inversion of prosopopoeia or personification).",
            example: "'She was a doormat upon which the tread of too many boots had scraped.'"
          },
          {
            word: "Anapodoton",
            type: "noun",
            definition: "A figure in which a main clause is suggested by the introduction of a subordinate clause, but that main clause never occurs.",
            example: "'If you think I'm going to sit here and take your insults...'"
          },
          {
            word: "Antimetabole",
            type: "noun",
            definition: "A subset of chiasmus, involving the precise repetition of words in reversed order to contrast concepts.",
            example: "'Ask not what your country can do for you; ask what you can do for your country.' — John F. Kennedy"
          },
          {
            word: "Epanorthosis",
            type: "noun",
            definition: "The immediate, emphatic rephrasing of a statement to make it stronger, more accurate or more intense.",
            example: "1. 'The film was good — no, it was magnificent' 2. 'He is a fast runner — rather, the fastest!'"
          },
          {
            word: "Amphibologia",
            type: "noun",
            definition: "Where a sentence or phrase can be interpreted in more than one way due to ambiguous structure or phrasing. Often used intentionally to create double meanings, protect a speaker from liability or generate humour.",
            example: "1. 'She sees more of her children than her husband' 2. 'Their unspeakable wives / Are skinny as whippets' – Larkin, Toads"
          },
          {
            word: "Homonym",
            type: "noun",
            definition: "A word that looks and sounds exactly like another word but has a different meaning.",
            example: "'Time flies like an arrow; fruit flies like a banana' (uses 'flies' as a verb vs. noun, and 'like' as a preposition vs. verb)"
          },
          {
            word: "Homophone",
            type: "noun",
            definition: "A word that sounds exactly like another word but has a different meaning and usually a different spelling.",
            example: "'I wander thro' each charter'd street' – Blake 'London' (here 'wander' is a homophone for 'wonder', the meaning of which chimes with the poem's insistence on questioning authority in the city)"
          },
          {
            word: "Homograph",
            type: "noun",
            definition: "A word that means and sounds exactly like another but is spelt the same.",
            example: "1. 'A single tear (teer) fell from her eye when she saw the tear (tair) in her favorite dress.' 2. 'She was perfectly content (kun-tent) just scrolling through the content (con-tent) on her phone.'"
          },
          {
            word: "Epizeuxis",
            type: "noun",
            definition: "The immediate, consecutive repetition of a word or phrase for intense emphasis, emotion, or urgency.",
            example: "1. 'Never, never, never, never, never!' — Shakespeare, King Lear 2. 'Row, row, row your boat'"
          },
          {
            word: "Diacope",
            type: "noun",
            definition: "The repetition of a word or phrase with one or more intervening words.",
            example: "'To be, or not to be' — Shakespeare, Hamlet"
          },
          {
            word: "Anastrophe",
            type: "noun",
            definition: "Departure from normal word order for the sake of emphasis. A more specific instance of hyperbaton: the changing of the position of only a single word.",
            example: "1. 'Glistens the dew upon the morning grass.' (Normally: The dew glistens upon the morning grass) 2. 'It only stands / Our lives upon, to use Our strongest hands' — Shakespeare, Antony and Cleopatra 2.1.50-51 (Preposition following the object of the preposition (normal syntax is preposition, object ["upon our lives"])"
          },
        ]
      },

    ];


    // ═══════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════

    let activeListIndex = 0;   // which list is currently shown
    let lastWordIndex   = -1;  // prevents showing same word twice in a row


    // ═══════════════════════════════════════════
    // BUILD TABS
    // One button per list, generated automatically
    // ═══════════════════════════════════════════

    const tabBar = document.getElementById("tab-bar");

    lists.forEach(function(list, index) {
      const tab = document.createElement("button");
      tab.className  = "tab";
      tab.textContent = list.label;

      tab.addEventListener("click", function(e) {
        e.stopPropagation();   // prevent click reaching stage (which would randomise)
        switchList(index);
      });

      tabBar.appendChild(tab);
    });


    // ═══════════════════════════════════════════
    // SWITCH LIST
    // Updates the active list, stage colour, and word display
    // ═══════════════════════════════════════════

    function switchList(index) {
      activeListIndex = index;
      lastWordIndex   = -1;

      // Update tab appearances
      document.querySelectorAll(".tab").forEach(function(tab, i) {
        tab.classList.toggle("active", i === index);
      });

      // Update stage colour
      document.getElementById("stage").style.backgroundColor = lists[index].color;

      // Update list heading
      document.getElementById("list-heading").textContent = lists[index].label;

      // Show a random word from the new list
      showRandom();

      // Rebuild the word list below
      renderList();
    }


    // ═══════════════════════════════════════════
    // SHOW RANDOM WORD
    // Picks from the currently active list only
    // ═══════════════════════════════════════════

    function showRandom() {
      const words = lists[activeListIndex].words;
      if (words.length === 0) return;

      let index;
      do {
        index = Math.floor(Math.random() * words.length);
      } while (words.length > 1 && index === lastWordIndex);
      lastWordIndex = index;

      const word  = words[index];
      const stage = document.getElementById("stage");

      stage.classList.add("fading");

      setTimeout(function() {
        document.getElementById("display-word").textContent       = word.word;
        document.getElementById("display-type").textContent       = word.type || "";
        document.getElementById("display-definition").textContent = word.definition;
        document.getElementById("display-example").textContent    = word.example ? `"${word.example}"` : "";
        stage.classList.remove("fading");
      }, 200);
    }

    // Click anywhere on the stage for a new word
    document.getElementById("stage").addEventListener("click", showRandom);


    // ═══════════════════════════════════════════
    // RENDER WORD LIST
    // Shows all words in the active list, sorted A–Z
    // ═══════════════════════════════════════════

    function renderList() {
      const listDiv = document.getElementById("word-list");
      listDiv.innerHTML = "";

      const words  = lists[activeListIndex].words;
      const sorted = [...words].sort((a, b) => a.word.localeCompare(b.word));

      sorted.forEach(function(word) {
        const row = document.createElement("div");
        row.className = "word-row";

        row.innerHTML = `
          <span class="w">${word.word}</span>
          <span class="t">${word.type || ""}</span>
          <span class="d">${word.definition}</span>
          ${word.example ? `<span class="ex">"${word.example}"</span>` : ""}
        `;

        // Clicking a word in the list spotlights it on the stage
        row.addEventListener("click", function() {
          document.getElementById("display-word").textContent       = word.word;
          document.getElementById("display-type").textContent       = word.type || "";
          document.getElementById("display-definition").textContent = word.definition;
          document.getElementById("display-example").textContent    = word.example ? `"${word.example}"` : "";
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        listDiv.appendChild(row);
      });
    }


    // ── Start on the first list ──
    switchList(0);

  </script>

</body>
</html>
