<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Favourite Words</title>

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #f5f3ef;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }


    /* ─────────────────────────────────────
       TAB SWITCHER
       Sits at the very top of the stage,
       letting you switch between lists.
    ───────────────────────────────────── */

    .tab-bar {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 18px 20px 0;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      flex-wrap: wrap;
    }

    .tab {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-family: -apple-system, sans-serif;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .tab:hover {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .tab.active {
      background: white;
      color: #1a1a1a;
      border-color: white;
      font-weight: 500;
    }


    /* ─────────────────────────────────────
       STAGE — full screen, colour changes
       per active list
    ───────────────────────────────────── */

    .stage {
      color: white;
      flex: 0 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 30px 40px;
      text-align: center;
      cursor: pointer;
      position: relative;
      user-select: none;
      transition: background-color 0.5s ease;
    }

    .stage-hint {
      position: absolute;
      top: 72px;        /* sits just below the tab bar */
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #display-type {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 14px;
      font-family: -apple-system, sans-serif;
      min-height: 16px;
    }

    #display-word {
      font-size: clamp(32px, 8vw, 64px);
      font-weight: normal;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
    }

    #display-definition {
      font-size: 16px;
      font-style: italic;
      color: rgba(255,255,255,0.6);
      max-width: 400px;
      line-height: 1.65;
    }

    #display-example {
      font-size: 14px;
      font-style: italic;
      color: rgba(255,255,255,0.32);
      max-width: 400px;
      line-height: 1.65;
      margin-top: 14px;
    }

    .stage-footer {
      position: absolute;
      bottom: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      font-family: -apple-system, sans-serif;
    }

    /* Fade transition */
    .stage.fading { opacity: 0; transition: opacity 0.2s ease; }
    .stage        { opacity: 1; transition: opacity 0.35s ease, background-color 0.5s ease; }


    /* ─────────────────────────────────────
       WORD LIST
    ───────────────────────────────────── */

    .list-section {
      padding: 32px 20px 60px;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
    }

    .list-section h2 {
      font-size: 13px;
      font-weight: normal;
      color: #bbb;
      margin-bottom: 18px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: -apple-system, sans-serif;
    }

    .word-row {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 13px 16px;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.12s;
    }

    .word-row:hover { border-color: #bbb; }

    .word-row .w {
      font-size: 17px;
      color: #1a1a1a;
      flex-shrink: 0;
    }

    .word-row .t {
      font-size: 11px;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
      font-family: -apple-system, sans-serif;
    }

    .word-row .d {
      font-size: 13px;
      font-style: italic;
      color: #888;
      flex: 1;
      line-height: 1.4;
      min-width: 100%;   /* forces definition onto its own line */
    }

    .word-row .ex {
      font-size: 12px;
      font-style: italic;
      color: #bbb;
      width: 100%;
      line-height: 1.5;
    }

  </style>
</head>

<body>

  <!-- STAGE: full-screen colour block with random word -->
  <div class="stage" id="stage">

    <!-- Tab switcher sits inside the stage so it floats over it -->
    <div class="tab-bar" id="tab-bar"></div>

    <span class="stage-hint" id="stage-hint">✦ word of the moment</span>
    <div id="display-type"></div>
    <div id="display-word"></div>
    <div id="display-definition"></div>
    <div id="display-example"></div>
    <span class="stage-footer">click anywhere for another · scroll down for all words</span>
  </div>


  <!-- WORD LIST: always beige regardless of active list -->
  <div class="list-section">
    <h2 id="list-heading">All Words</h2>
    <div id="word-list"></div>
  </div>


  <script>

    // ═══════════════════════════════════════════
    // LISTS
    //
    // Each list has:
    //   label     — shown on the tab button
    //   color     — the stage background when active
    //   words     — array of word objects
    //
    // To add a new list: copy one list block,
    // give it a new label and color, add your words.
    //
    // To add a word: copy a word block into the
    // relevant list's words array.
    // example is optional — leave it out if you don't have one.
    // ═══════════════════════════════════════════

    const lists = [

      {
        label: "English",
        color: "#1a1a1a",
        words: [
          {
            word: "ephemeral",
            type: "adjective",
            definition: "Lasting for a very short time.",
            example: "The ephemeral beauty of cherry blossoms makes them all the more precious."
          },
          {
            word: "lucid",
            type: "adjective",
            definition: "Expressed clearly; easy to understand.",
            example: "Despite the complexity of the subject, her explanation was remarkably lucid."
          },
          {
            word: "susurrus",
            type: "noun",
            definition: "A whispering or rustling sound.",
          },
          {
            word: "liminal",
            type: "adjective",
            definition: "Occupying a position at or on both sides of a boundary or threshold.",
          },
          {
            word: "mellifluous",
            type: "adjective",
            definition: "Sweet or musical; pleasant to hear.",
          },
        ]
      },

      {
        label: "French",
        color: "#2c4a6e",   /* deep blue — change to any colour you like */
        words: [
          {
            word: "dépaysement",
            type: "nom masculin",
            definition: "The feeling of being a foreigner; disorientation from being away from home.",
            example: "Elle ressentait un profond dépaysement en arrivant dans cette ville inconnue."
          },
          {
            word: "flâner",
            type: "verbe",
            definition: "To stroll or wander without purpose, taking in one's surroundings.",
            example: "Il aimait flâner le long de la Seine le dimanche matin."
          },
          {
            word: "soupçon",
            type: "nom masculin",
            definition: "A very small amount; a hint or trace of something.",
          },
        ]
      },

      {
        label: "Rhetorical Devices",
        color: "#3d2645",   /* deep purple — change to any colour you like */
        words: [
          {
            word: "anaphora",
            type: "noun",
            definition: "The repetition of a word or phrase at the beginning of successive clauses.",
            example: "We shall fight on the beaches, we shall fight on the landing grounds, we shall fight in the fields."
          },
          {
            word: "chiasmus",
            type: "noun",
            definition: "A rhetorical device in which two clauses are related by reversal of structure.",
            example: "Ask not what your country can do for you — ask what you can do for your country."
          },
          {
            word: "synecdoche",
            type: "noun",
            definition: "A figure of speech in which a part represents the whole, or vice versa.",
            example: "All hands on deck."
          },
          {
            word: "litotes",
            type: "noun",
            definition: "Understatement using a negative to affirm a positive.",
            example: "It's not rocket science."
          },
        ]
      },

    ];


    // ═══════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════

    let activeListIndex = 0;   // which list is currently shown
    let lastWordIndex   = -1;  // prevents showing same word twice in a row


    // ═══════════════════════════════════════════
    // BUILD TABS
    // One button per list, generated automatically
    // ═══════════════════════════════════════════

    const tabBar = document.getElementById("tab-bar");

    lists.forEach(function(list, index) {
      const tab = document.createElement("button");
      tab.className  = "tab";
      tab.textContent = list.label;

      tab.addEventListener("click", function(e) {
        e.stopPropagation();   // prevent click reaching stage (which would randomise)
        switchList(index);
      });

      tabBar.appendChild(tab);
    });


    // ═══════════════════════════════════════════
    // SWITCH LIST
    // Updates the active list, stage colour, and word display
    // ═══════════════════════════════════════════

    function switchList(index) {
      activeListIndex = index;
      lastWordIndex   = -1;

      // Update tab appearances
      document.querySelectorAll(".tab").forEach(function(tab, i) {
        tab.classList.toggle("active", i === index);
      });

      // Update stage colour
      document.getElementById("stage").style.backgroundColor = lists[index].color;

      // Update list heading
      document.getElementById("list-heading").textContent = lists[index].label;

      // Show a random word from the new list
      showRandom();

      // Rebuild the word list below
      renderList();
    }


    // ═══════════════════════════════════════════
    // SHOW RANDOM WORD
    // Picks from the currently active list only
    // ═══════════════════════════════════════════

    function showRandom() {
      const words = lists[activeListIndex].words;
      if (words.length === 0) return;

      let index;
      do {
        index = Math.floor(Math.random() * words.length);
      } while (words.length > 1 && index === lastWordIndex);
      lastWordIndex = index;

      const word  = words[index];
      const stage = document.getElementById("stage");

      stage.classList.add("fading");

      setTimeout(function() {
        document.getElementById("display-word").textContent       = word.word;
        document.getElementById("display-type").textContent       = word.type || "";
        document.getElementById("display-definition").textContent = word.definition;
        document.getElementById("display-example").textContent    = word.example ? `"${word.example}"` : "";
        stage.classList.remove("fading");
      }, 200);
    }

    // Click anywhere on the stage for a new word
    document.getElementById("stage").addEventListener("click", showRandom);


    // ═══════════════════════════════════════════
    // RENDER WORD LIST
    // Shows all words in the active list, sorted A–Z
    // ═══════════════════════════════════════════

    function renderList() {
      const listDiv = document.getElementById("word-list");
      listDiv.innerHTML = "";

      const words  = lists[activeListIndex].words;
      const sorted = [...words].sort((a, b) => a.word.localeCompare(b.word));

      sorted.forEach(function(word) {
        const row = document.createElement("div");
        row.className = "word-row";

        row.innerHTML = `
          <span class="w">${word.word}</span>
          <span class="t">${word.type || ""}</span>
          <span class="d">${word.definition}</span>
          ${word.example ? `<span class="ex">"${word.example}"</span>` : ""}
        `;

        // Clicking a word in the list spotlights it on the stage
        row.addEventListener("click", function() {
          document.getElementById("display-word").textContent       = word.word;
          document.getElementById("display-type").textContent       = word.type || "";
          document.getElementById("display-definition").textContent = word.definition;
          document.getElementById("display-example").textContent    = word.example ? `"${word.example}"` : "";
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        listDiv.appendChild(row);
      });
    }


    // ── Start on the first list ──
    switchList(0);

  </script>

</body>
</html>
