<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocab Mirabilis</title>

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #f5f3ef;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }


    /* ─────────────────────────────────────
       TOP HALF — random word display
       Click anywhere on it for a new word
    ───────────────────────────────────── */

    .stage {
      background: #1a1a1a;
      color: white;
      flex: 0 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 30px;
      text-align: center;
      cursor: pointer;
      position: relative;
      user-select: none;
    }

    .stage-hint {
      position: absolute;
      top: 18px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #display-type {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 14px;
      font-family: -apple-system, sans-serif;
      min-height: 16px;
    }

    #display-word {
      font-size: clamp(32px, 8vw, 64px);
      font-weight: normal;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
    }

    #display-definition {
      font-size: 16px;
      font-style: italic;
      color: rgba(255,255,255,0.6);
      max-width: 400px;
      line-height: 1.65;
    }

    .stage-footer {
      position: absolute;
      bottom: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      font-family: -apple-system, sans-serif;
    }

    /* Fade transition */
    .stage.fading { opacity: 0; transition: opacity 0.2s ease; }
    .stage        { opacity: 1; transition: opacity 0.35s ease; }


    /* ─────────────────────────────────────
       BOTTOM HALF — the full word list
    ───────────────────────────────────── */

    .list-section {
      padding: 32px 20px 60px;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
    }

    .list-section h2 {
      font-size: 13px;
      font-weight: normal;
      color: #bbb;
      margin-bottom: 18px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: -apple-system, sans-serif;
    }

    .word-row {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 13px 16px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.12s;
    }

    .word-row:hover { border-color: #bbb; }

    .word-row .w {
      font-size: 17px;
      color: #1a1a1a;
      flex-shrink: 0;
    }

    .word-row .t {
      font-size: 11px;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
      font-family: -apple-system, sans-serif;
    }

    .word-row .d {
      font-size: 13px;
      font-style: italic;
      color: #888;
      flex: 1;
      line-height: 1.4;
    }

  </style>
</head>

<body>

  <!-- TOP: click anywhere to see a new random word -->
  <div class="stage" id="stage">
    <span class="stage-hint">✦ vocab mirabilis ✦</span>
    <div id="display-type"></div>
    <div id="display-word"></div>
    <div id="display-definition"></div>
    <span class="stage-footer">click for another · scroll down for all words</span>
  </div>


  <!-- BOTTOM: full list of all words -->
  <div class="list-section">
    <h2>All Words</h2>
    <div id="word-list"></div>
  </div>


  <script>

    // ═══════════════════════════════════════════
    // YOUR WORDS
    //
    // To add a new word: copy one block and fill in
    // word, type, and definition. Save and push to GitHub.
    //
    // type options: noun, verb, adjective, adverb, phrase
    // ═══════════════════════════════════════════

    const words = [
      {
        word: "Obstreperous",
        type: "adjective",
        definition: "Noisy, unruly and difficult to control or manage, often describing defiant behaviour."
      },
      {
        word: "Pusillanimous",
        type: "adjective",
        definition: "Lacking courage, resolution or strength, often acting in a contemptibly timid, cowardly or small-minded manner."
      },
      {
        word: "Susurrous",
        type: "adjective",
        definition: "Describes a soft, whispering, rustling, or murmuring sound, often found in nature like wind through leaves or water lapping."
      },
      {
        word: "Garrulous",
        type: "adjective",
        definition: "Excessively talkative, especially regarding trivial or unimportant matters, often in a rambling or wordy manner."
      },
      {
        word: "Mellifluous",
        type: "adjective",
        definition: "Sweet or musical; pleasant to hear."
      },
      {
        word: "Ebullience",
        type: "noun",
        definition: "High-spirited enthusiasm or energy."
      },
      {
        word: "Obseqious",
        type: "noun",
        definition: "Excessively eager to please, praise or obey, often in a servile or fawning manner to gain favour."
      },
    ];


    // ── Show a random word on the stage ──

    let lastIndex = -1;

    function showRandom() {
      if (words.length === 0) return;

      // Pick a random index that isn't the same as the last one
      let index;
      do {
        index = Math.floor(Math.random() * words.length);
      } while (words.length > 1 && index === lastIndex);
      lastIndex = index;

      const word  = words[index];
      const stage = document.getElementById("stage");

      // Fade out, swap, fade back in
      stage.classList.add("fading");

      setTimeout(function() {
        document.getElementById("display-word").textContent       = word.word;
        document.getElementById("display-type").textContent       = word.type;
        document.getElementById("display-definition").textContent = word.definition;
        stage.classList.remove("fading");
      }, 200);
    }

    // Click anywhere on the stage for a new word
    document.getElementById("stage").addEventListener("click", showRandom);


    // ── Build the word list ──

    function renderList() {
      const listDiv = document.getElementById("word-list");
      listDiv.innerHTML = "";

      // Sort alphabetically
      const sorted = [...words].sort((a, b) => a.word.localeCompare(b.word));

      sorted.forEach(function(word) {
        const row = document.createElement("div");
        row.className = "word-row";

        row.innerHTML = `
          <span class="w">${word.word}</span>
          <span class="t">${word.type}</span>
          <span class="d">${word.definition}</span>
        `;

        // Clicking a word in the list shows it on the stage
        row.addEventListener("click", function() {
          document.getElementById("display-word").textContent       = word.word;
          document.getElementById("display-type").textContent       = word.type;
          document.getElementById("display-definition").textContent = word.definition;
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        listDiv.appendChild(row);
      });
    }


    // ── Start ──
    showRandom();
    renderList();

  </script>

</body>
</html>
