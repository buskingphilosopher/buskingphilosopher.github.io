<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShowMe</title>

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #f5f3ef;
      margin: 0;
    }


    /* ─────────────────────────────────────
       MODE SWITCHER BAR — fixed at top
    ───────────────────────────────────── */

    .mode-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      background: #1a1a1a;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .mode-btn {
      padding: 14px 28px;
      font-size: 13px;
      font-family: Georgia, serif;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
      border-bottom: 2px solid transparent;
    }

    .mode-btn:hover { color: rgba(255,255,255,0.8); }

    .mode-btn.active {
      color: white;
      border-bottom-color: white;
    }


    /* ─────────────────────────────────────
       PAGES
    ───────────────────────────────────── */

    .page {
      display: none;
      padding-top: 50px;
    }

    .page.active { display: block; }


    /* ─────────────────────────────────────
       CAROUSEL
       Each tab has its own carousel.
       They all share this CSS.
    ───────────────────────────────────── */

    .carousel {
      width: 100%;
      height: 300px;
      position: relative;
      overflow: hidden;
      background: #1a1a1a;
      cursor: pointer;
    }

    .carousel-slide {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .carousel-slide.active { opacity: 1; }

    /* Caption gradient at bottom of each slide */
    .carousel-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      color: white;
      font-size: 12px;
      font-style: italic;
      padding: 30px 14px 10px;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }

    .carousel-caption.active { opacity: 1; }

    /* Dot indicators */
    .carousel-dots {
      position: absolute;
      bottom: 10px;
      right: 12px;
      display: flex;
      gap: 5px;
      z-index: 2;
    }

    .carousel-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      cursor: pointer;
      transition: background 0.3s;
    }

    .carousel-dot.active { background: white; }


    /* ─────────────────────────────────────
       SHARED SEARCH LAYOUT
    ───────────────────────────────────── */

    .search-wrap {
      max-width: 580px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .search-wrap h1 {
      font-size: 22px;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .search-wrap p.subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    input.search-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      font-family: Georgia, serif;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      box-sizing: border-box;
      outline: none;
    }

    input.search-input:focus { border-color: #888; }

    .chips {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      margin-top: 14px;
      overflow-x: auto;
      padding-bottom: 6px;
      scrollbar-width: none;
    }

    .chip {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 13px;
      font-family: Georgia, serif;
      border: 1px solid #ddd;
      background: white;
      color: #555;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .chip.active {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }

    .chip:hover:not(.active) { border-color: #aaa; color: #222; }

    .results {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .no-results {
      font-size: 14px;
      color: #aaa;
      font-style: italic;
    }

    .copied-msg {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin-top: 12px;
      min-height: 20px;
    }


    /* ─────────────────────────────────────
       POETRY CARDS
    ───────────────────────────────────── */

    .poetry-card {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 16px 18px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .poetry-card:hover { border-color: #aaa; }

    .poetry-card .quote {
      font-size: 15px;
      font-style: italic;
      color: #222;
      line-height: 1.65;
      margin-bottom: 10px;
    }

    .poetry-card .title {
      font-size: 12px;
      color: #bbb;
      font-style: italic;
      margin-bottom: 2px;
    }

    .poetry-card .passage {
      font-size: 11px;
      color: #ccc;
      margin-bottom: 2px;
    }

    .poetry-card .poet {
      font-size: 12px;
      color: #999;
    }


    /* ─────────────────────────────────────
       MUSIC CARDS
    ───────────────────────────────────── */

    .music-card {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
    }

    .music-card .embed-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }

    .music-card .embed-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .music-card .music-info {
      padding: 14px 16px;
    }

    .music-card .work     { font-size: 15px; color: #1a1a1a; margin-bottom: 4px; }
    .music-card .composer { font-size: 13px; color: #888; margin-bottom: 6px; }
    .music-card .music-note {
      font-size: 12px;
      font-style: italic;
      color: #bbb;
      line-height: 1.5;
    }


    /* ─────────────────────────────────────
       PAINTING CARDS
    ───────────────────────────────────── */

    .painting-card {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
    }

    .painting-card img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .painting-card .painting-info {
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .painting-card .work {
      font-size: 15px;
      font-style: italic;
      color: #1a1a1a;
      margin-bottom: 3px;
    }

    .painting-card .artist {
      font-size: 13px;
      color: #888;
      margin-bottom: 4px;
    }

    .painting-card .mood-note {
      font-size: 12px;
      color: #bbb;
      font-style: italic;
      line-height: 1.5;
    }

    .copy-btn {
      background: #f5f3ef;
      border: 1px solid #e0ddd8;
      border-radius: 6px;
      font-size: 12px;
      font-family: Georgia, serif;
      color: #888;
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }

    .copy-btn:hover { border-color: #aaa; color: #555; }

  </style>
</head>

<body>

  <!-- MODE SWITCHER -->

    <button class="mode-btn active" onclick="switchMode('poetry', this)">✦ Poetry</button>

  <!-- ══════════════════════════════════
       POETRY PAGE
  ══════════════════════════════════ -->

    // ═══════════════════════════════════════════
    // BUILD A CAROUSEL
    // Called once per tab on page load
    // ═══════════════════════════════════════════

    const carouselTimers = {};  // store interval IDs so we can clear them if needed

    function buildCarousel(tabName) {
      const slides   = carouselData[tabName];
      const container = document.getElementById("carousel-" + tabName);
      const dotsEl    = document.getElementById("dots-" + tabName);
      const captionEl = document.getElementById("caption-" + tabName);

      // Move caption inside container so it overlays the image
      container.appendChild(captionEl);

      let current = 0;

      // Build a slide and dot for each image
      slides.forEach(function(slide, index) {
        // Slide div containing the image
        const slideEl = document.createElement("div");
        slideEl.className = "carousel-slide";

        const img = document.createElement("img");
        img.src = slide.image;
        img.alt = slide.caption;
        slideEl.appendChild(img);

        // Insert before the dots so dots sit on top
        container.insertBefore(slideEl, dotsEl);

        // Dot
        const dot = document.createElement("div");
        dot.className = "carousel-dot";
        dot.addEventListener("click", function(e) {
          e.stopPropagation();
          current = index;
          goTo(index);
        });
        dotsEl.appendChild(dot);
      });

      // Go to a specific slide
      function goTo(index) {
        container.querySelectorAll(".carousel-slide").forEach(s => s.classList.remove("active"));
        dotsEl.querySelectorAll(".carousel-dot").forEach(d => d.classList.remove("active"));
        captionEl.classList.remove("active");

        container.querySelectorAll(".carousel-slide")[index].classList.add("active");
        dotsEl.querySelectorAll(".carousel-dot")[index].classList.add("active");

        captionEl.textContent = slides[index].caption;
        setTimeout(() => captionEl.classList.add("active"), 100);
      }

      // Show first slide immediately
      goTo(0);

      // Auto-advance every 7 seconds
      carouselTimers[tabName] = setInterval(function() {
        current = (current + 1) % slides.length;
        goTo(current);
      }, 7000);

      // Click carousel to advance
      container.addEventListener("click", function() {
        current = (current + 1) % slides.length;
        goTo(current);
      });

      // Swipe support
      let touchStartX = 0;
      container.addEventListener("touchstart", function(e) {
        touchStartX = e.touches[0].clientX;
      });
      container.addEventListener("touchend", function(e) {
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) < 40) return;
        current = diff > 0
          ? (current + 1) % slides.length
          : (current - 1 + slides.length) % slides.length;
        goTo(current);
      });
    }

    // Build all three carousels on load
    buildCarousel("poetry");
    buildCarousel("music");
    buildCarousel("painting");

    // ═══════════════════════════════════════════
    // SHARED SEARCH ENGINE
    // ═══════════════════════════════════════════

    function buildSearch(config) {
      const { data, searchId, chipsId, resultsId, copiedId, renderCard } = config;

      const searchBox  = document.getElementById(searchId);
      const chipsDiv   = document.getElementById(chipsId);
      const resultsDiv = document.getElementById(resultsId);
      const copiedMsg  = copiedId ? document.getElementById(copiedId) : null;

      const allMoods = new Set();
      data.forEach(item => item.moods.forEach(m => allMoods.add(m)));
      const sorted = [...allMoods].sort();

      let activeChip = null;

      sorted.forEach(function(mood) {
        const chip = document.createElement("button");
        chip.className   = "chip";
        chip.textContent = mood;

        chip.addEventListener("click", function() {
          if (activeChip === mood) {
            activeChip = null;
            chip.classList.remove("active");
            clearResults();
            searchBox.value = "";
            return;
          }
          document.querySelectorAll(`#${chipsId} .chip`).forEach(c => c.classList.remove("active"));
          activeChip = mood;
          chip.classList.add("active");
          searchBox.value = mood;
          runSearch(mood);
        });

        chipsDiv.appendChild(chip);
      });

      searchBox.addEventListener("input", function() {
        document.querySelectorAll(`#${chipsId} .chip`).forEach(c => c.classList.remove("active"));
        activeChip = null;
        const query = searchBox.value.toLowerCase().trim();
        if (query.length < 2) { clearResults(); return; }
        runSearch(query);
      });

      function runSearch(query) {
        clearResults();
        const translated = synonyms[query] || query;
        const matches = data.filter(item =>
          item.moods.some(m => m.includes(translated) || translated.includes(m))
        );

        if (matches.length === 0) {
          resultsDiv.innerHTML = "<p class='no-results'>Nothing found — try another feeling.</p>";
          return;
        }

        matches.forEach(item => resultsDiv.appendChild(renderCard(item, copiedMsg)));
      }

      function clearResults() {
        resultsDiv.innerHTML = "";
        if (copiedMsg) copiedMsg.textContent = "";
      }
    }


    // ═══════════════════════════════════════════
    // CARD RENDERERS
    // ═══════════════════════════════════════════

    function stripHTML(str) {
      const d = document.createElement("div");
      d.innerHTML = str;
      return d.textContent;
    }

    function renderPoetryCard(poem, copiedMsg) {
      const card = document.createElement("div");
      card.className = "poetry-card";
      card.innerHTML = `
        <div class="quote">"${poem.quote}"</div>
        ${poem.title   ? `<div class="title">${poem.title}${poem.date ? " " + poem.date : ""}</div>` : ""}
        ${poem.passage ? `<div class="passage">${poem.passage}</div>` : ""}
        <div class="poet">— ${poem.poet}</div>
      `;
      card.addEventListener("click", function() {
        navigator.clipboard.writeText(`"${stripHTML(poem.quote)}" — ${poem.poet}`);
        copiedMsg.textContent = "Copied! Paste it anywhere ✓";
      });
      return card;
    }

    function renderMusicCard(piece) {
      const card = document.createElement("div");
      card.className = "music-card";
      const startParam = piece.start ? `&start=${piece.start}` : "";
      card.innerHTML = `
        <div class="embed-wrap">
          <iframe
            src="https://www.youtube.com/embed/${piece.youtubeId}?rel=0${startParam}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>
        <div class="music-info">
          <div class="work">${piece.work}</div>
          <div class="composer">${piece.composer}</div>
          ${piece.note ? `<div class="music-note">${piece.note}</div>` : ""}
        </div>
      `;
      return card;
    }

    function renderPaintingCard(painting, copiedMsg) {
      const card = document.createElement("div");
      card.className = "painting-card";
      card.innerHTML = `
        <img src="${painting.image}" alt="${painting.work}" loading="lazy" />
        <div class="painting-info">
          <div class="painting-text">
            <div class="work">${painting.work}</div>
            <div class="artist">${painting.artist}</div>
            ${painting.note ? `<div class="mood-note">${painting.note}</div>` : ""}
          </div>
          <button class="copy-btn">Copy</button>
        </div>
      `;

      card.querySelector(".copy-btn").addEventListener("click", function(e) {
        e.stopPropagation();
        navigator.clipboard.writeText(`${painting.work} — ${painting.artist}`);
        this.textContent = "Copied ✓";
        const btn = this;
        setTimeout(() => btn.textContent = "Copy", 2000);
        if (copiedMsg) copiedMsg.textContent = "Citation copied!";
      });

      return card;
    }

    // INITIALISE SEARCH ENGINES
    // ═══════════════════════════════════════════

    buildSearch({

      chipsId: "poetry-chips", resultsId: "poetry-results",
      copiedId: "poetry-copied", renderCard: renderPoetryCard

    buildSearch({

      copiedId: null, renderCard: renderMusicCard

      copiedId: "painting-copied", renderCard: renderPaintingCard

  </script>
