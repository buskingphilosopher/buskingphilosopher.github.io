<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShowMe</title>

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #f5f3ef;
      margin: 0;
    }


    /* ─────────────────────────────────────
       MODE SWITCHER BAR
    ───────────────────────────────────── */

    .mode-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      gap: 0;
      background: #1a1a1a;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .mode-btn {
      padding: 14px 28px;
      font-size: 13px;
      font-family: Georgia, serif;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
      border-bottom: 2px solid transparent;
    }

    .mode-btn:hover { color: rgba(255,255,255,0.8); }

    .mode-btn.active {
      color: white;
      border-bottom-color: white;
    }


    /* ─────────────────────────────────────
       PAGES — only one visible at a time
    ───────────────────────────────────── */

    .page {
      display: none;
      padding-top: 50px; /* clears the fixed mode bar */
    }

    .page.active { display: block; }


    /* ─────────────────────────────────────
       SHARED SEARCH LAYOUT
       Used by all three modes
    ───────────────────────────────────── */

    .search-wrap {
      max-width: 580px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    .search-wrap h1 {
      font-size: 22px;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .search-wrap p.subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    input.search-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      font-family: Georgia, serif;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      box-sizing: border-box;
      outline: none;
    }

    input.search-input:focus { border-color: #888; }

    .chips {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      margin-top: 14px;
      overflow-x: auto;
      padding-bottom: 6px;
      scrollbar-width: none;
    }

    .chip {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 13px;
      font-family: Georgia, serif;
      border: 1px solid #ddd;
      background: white;
      color: #555;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .chip.active {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }

    .chip:hover:not(.active) { border-color: #aaa; color: #222; }

    .results {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .no-results {
      font-size: 14px;
      color: #aaa;
      font-style: italic;
      margin-top: 8px;
    }

    .copied-msg {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin-top: 12px;
      min-height: 20px;
    }


    /* ─────────────────────────────────────
       POETRY CARDS
    ───────────────────────────────────── */

    .poetry-card {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 16px 18px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .poetry-card:hover { border-color: #aaa; }

    .poetry-card .quote {
      font-size: 15px;
      font-style: italic;
      color: #222;
      line-height: 1.65;
      margin-bottom: 10px;
    }

    .poetry-card .title {
      font-size: 12px;
      color: #bbb;
      font-style: italic;
      margin-bottom: 2px;
    }

    .poetry-card .passage {
      font-size: 11px;
      color: #ccc;
      margin-bottom: 2px;
    }

    .poetry-card .poet {
      font-size: 12px;
      color: #999;
    }


    /* ─────────────────────────────────────
       MUSIC CARDS
    ───────────────────────────────────── */

    .music-card {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
    }

    .music-card .embed-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 ratio */
      background: #000;
    }

    .music-card .embed-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .music-card .music-info {
      padding: 14px 16px;
    }

    .music-card .work {
      font-size: 15px;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .music-card .composer {
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }

    .music-card .music-note {
      font-size: 12px;
      font-style: italic;
      color: #bbb;
      line-height: 1.5;
    }


    /* ─────────────────────────────────────
       PAINTING CARDS
    ───────────────────────────────────── */

    .painting-card {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
    }

    .painting-card img {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .painting-card .painting-info {
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .painting-card .painting-text .work {
      font-size: 15px;
      font-style: italic;
      color: #1a1a1a;
      margin-bottom: 3px;
    }

    .painting-card .painting-text .artist {
      font-size: 13px;
      color: #888;
      margin-bottom: 4px;
    }

    .painting-card .painting-text .mood-note {
      font-size: 12px;
      color: #bbb;
      font-style: italic;
      line-height: 1.5;
    }

    .copy-btn {
      background: #f5f3ef;
      border: 1px solid #e0ddd8;
      border-radius: 6px;
      font-size: 12px;
      font-family: Georgia, serif;
      color: #888;
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }

    .copy-btn:hover { border-color: #aaa; color: #555; }

  </style>
</head>

<body>

  <!-- MODE SWITCHER -->
  <nav class="mode-bar">
    <button class="mode-btn active" onclick="switchMode('poetry')">✦ Poetry</button>
    <button class="mode-btn"        onclick="switchMode('music')">♩ Music</button>
    <button class="mode-btn"        onclick="switchMode('painting')">◻ Paintings</button>
  </nav>


  <!-- ══════════════════════════════════
       POETRY PAGE
  ══════════════════════════════════ -->
  <div class="page active" id="page-poetry">
    <div class="search-wrap">
      <h1>✦ ShowMePoetry</h1>
      <p class="subtitle">Type an emotion to see how poets have expressed it.</p>
      <input class="search-input" id="poetry-search" placeholder="happy, lost, furious, grateful…" />
      <div class="chips" id="poetry-chips"></div>
      <div class="results" id="poetry-results"></div>
      <p class="copied-msg" id="poetry-copied"></p>
    </div>
  </div>


  <!-- ══════════════════════════════════
       MUSIC PAGE
  ══════════════════════════════════ -->
  <div class="page" id="page-music">
    <div class="search-wrap">
      <h1>♩ ShowMeMusic</h1>
      <p class="subtitle">Type an emotion to hear how composers have expressed it.</p>
      <input class="search-input" id="music-search" placeholder="joyful, melancholy, triumphant…" />
      <div class="chips" id="music-chips"></div>
      <div class="results" id="music-results"></div>
    </div>
  </div>


  <!-- ══════════════════════════════════
       PAINTING PAGE
  ══════════════════════════════════ -->
  <div class="page" id="page-painting">
    <div class="search-wrap">
      <h1>◻ ShowMePaintings</h1>
      <p class="subtitle">Type an emotion to see how painters have evoked it.</p>
      <input class="search-input" id="painting-search" placeholder="sublime, tender, melancholy…" />
      <div class="chips" id="painting-chips"></div>
      <div class="results" id="painting-results"></div>
      <p class="copied-msg" id="painting-copied"></p>
    </div>
  </div>

        sourceUrl: "https://commons.wikimedia.org/wiki/File:Edvard_Munch,_1893,_The_Scream,_oil,_tempera_and_pastel_on_cardboard,_91_x_73_cm,_National_Gallery_of_Norway.jpg"
      },
      {
        moods: ["love", "romantic", "tender", "beauty", "devotion"],
        work: "The Birth of Venus",
        artist: "Sandro Botticelli, c. 1484–1486",
        note: "Venus arrives on the shore on a shell — grace, beauty, and love made flesh. Serene and eternal.",
        imageUrl: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Sandro_Botticelli_046.jpg/1280px-Sandro_Botticelli_046.jpg",

      {
        moods: ["stormy", "turbulent", "dramatic", "power", "nature"],
        work: "Snow Storm: Steam-Boat off a Harbour's Mouth",
        artist: "J.M.W. Turner, 1842",
        note: "A ship swallowed by a vortex of sea and sky. Turner reportedly had himself tied to a mast to observe the storm.",

        sourceUrl: "https://commons.wikimedia.org/wiki/File:Joseph_Mallord_William_Turner_-_Snow_Storm_-_Steam-Boat_off_a_Harbour%27s_Mouth_-_WGA23178.jpg"
      },
    ];


    // ═══════════════════════════════════════════
    // SHARED SEARCH ENGINE
    // Reused by all three modes
    // ═══════════════════════════════════════════

    function buildSearch(config) {
      const { data, searchId, chipsId, resultsId, copiedId, renderCard } = config;

      const searchBox  = document.getElementById(searchId);
      const chipsDiv   = document.getElementById(chipsId);
      const resultsDiv = document.getElementById(resultsId);
      const copiedMsg  = copiedId ? document.getElementById(copiedId) : null;

      // Collect unique moods
      const allMoods = new Set();
      data.forEach(item => item.moods.forEach(m => allMoods.add(m)));
      const sorted = [...allMoods].sort();

      let activeChip = null;

      // Build chips
      sorted.forEach(function(mood) {
        const chip = document.createElement("button");
        chip.className   = "chip";
        chip.textContent = mood;

        chip.addEventListener("click", function() {
          if (activeChip === mood) {
            activeChip = null;
            chip.classList.remove("active");
            clearResults();
            searchBox.value = "";
            return;
          }
          document.querySelectorAll(`#${chipsId} .chip`).forEach(c => c.classList.remove("active"));
          activeChip = mood;
          chip.classList.add("active");
          searchBox.value = mood;
          runSearch(mood);
        });

        chipsDiv.appendChild(chip);
      });

      // Search on type
      searchBox.addEventListener("input", function() {
        document.querySelectorAll(`#${chipsId} .chip`).forEach(c => c.classList.remove("active"));
        activeChip = null;
        const query = searchBox.value.toLowerCase().trim();
        if (query.length < 2) { clearResults(); return; }
        runSearch(query);
      });

      function runSearch(query) {
        clearResults();
        const translated = synonyms[query] || query;

        const matches = data.filter(function(item) {
          return item.moods.some(m => m.includes(translated) || translated.includes(m));
        });

        if (matches.length === 0) {
          resultsDiv.innerHTML = "<p class='no-results'>Nothing found — try another feeling.</p>";
          return;
        }

        matches.forEach(function(item) {
          const card = renderCard(item, copiedMsg);
          resultsDiv.appendChild(card);
        });
      }

      function clearResults() {
        resultsDiv.innerHTML = "";
        if (copiedMsg) copiedMsg.textContent = "";
      }
    }


    // ═══════════════════════════════════════════
    // CARD RENDERERS — one per mode
    // ═══════════════════════════════════════════

    function stripHTML(str) {
      const d = document.createElement("div");
      d.innerHTML = str;
      return d.textContent;
    }

    // ── Poetry card ──
    function renderPoetryCard(poem, copiedMsg) {
      const card = document.createElement("div");
      card.className = "poetry-card";

      card.innerHTML = `
        <div class="quote">"${poem.quote}"</div>
        ${poem.title  ? `<div class="title">${poem.title}${poem.date ? " " + poem.date : ""}</div>` : ""}
        ${poem.passage ? `<div class="passage">${poem.passage}</div>` : ""}
        <div class="poet">— ${poem.poet}</div>
      `;

      card.addEventListener("click", function() {
        navigator.clipboard.writeText(`"${stripHTML(poem.quote)}" — ${poem.poet}`);
        copiedMsg.textContent = "Copied! Paste it anywhere ✓";
      });

      return card;
    }

    // ── Music card ──
    function renderMusicCard(piece) {
      const card = document.createElement("div");
      card.className = "music-card";

      // Build YouTube embed URL with start time
      const startParam = piece.start ? `&start=${piece.start}` : "";
      const embedUrl   = `https://www.youtube.com/embed/${piece.youtubeId}?rel=0${startParam}`;

      card.innerHTML = `
        <div class="embed-wrap">
          <iframe
            src="${embedUrl}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>
        <div class="music-info">
          <div class="work">${piece.work}</div>
          <div class="composer">${piece.composer}</div>
          ${piece.note ? `<div class="music-note">${piece.note}</div>` : ""}
        </div>
      `;

      return card;
    }

    // ── Painting card ──
    function renderPaintingCard(painting, copiedMsg) {
      const card = document.createElement("div");
      card.className = "painting-card";

      card.innerHTML = `
        <img src="${painting.imageUrl}" alt="${painting.work}" loading="lazy" />
        <div class="painting-info">
          <div class="painting-text">
            <div class="work">${painting.work}</div>
            <div class="artist">${painting.artist}</div>
            ${painting.note ? `<div class="mood-note">${painting.note}</div>` : ""}
          </div>
          <button class="copy-btn" id="copy-${painting.work.replace(/\s/g,'_')}">Copy</button>
        </div>
      `;

      // Copy citation to clipboard
      card.querySelector(".copy-btn").addEventListener("click", function(e) {
        e.stopPropagation();
        navigator.clipboard.writeText(`${painting.work} — ${painting.artist}`);
        this.textContent = "Copied ✓";
        const btn = this;
        setTimeout(() => btn.textContent = "Copy", 2000);
        copiedMsg.textContent = "Citation copied!";
      });

      // Click image to open source page
      card.querySelector("img").addEventListener("click", function() {
        window.open(painting.sourceUrl, "_blank");
      });
      card.querySelector("img").style.cursor = "pointer";

      return card;
    }


    // ═══════════════════════════════════════════
    // INITIALISE ALL THREE SEARCH ENGINES
    // ═══════════════════════════════════════════

    buildSearch({
      data:       poems,
      searchId:   "poetry-search",
      chipsId:    "poetry-chips",
      resultsId:  "poetry-results",
      copiedId:   "poetry-copied",
      renderCard: renderPoetryCard
    });

    buildSearch({
      data:       music,
      searchId:   "music-search",
      chipsId:    "music-chips",
      resultsId:  "music-results",
      copiedId:   null,
      renderCard: renderMusicCard
    });

    buildSearch({
      data:       paintings,
      searchId:   "painting-search",
      chipsId:    "painting-chips",
      resultsId:  "painting-results",
      copiedId:   "painting-copied",
      renderCard: renderPaintingCard
    });

  </script>

</body>
