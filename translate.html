<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click to Translate</title>

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #f5f3ef;
      min-height: 100vh;
      padding: 40px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 22px;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    p.subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    textarea {
      width: 100%;
      font-family: Georgia, serif;
      font-size: 16px;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      resize: vertical;
      outline: none;
      line-height: 1.6;
      color: #1a1a1a;
      min-height: 130px;
    }

    textarea:focus { border-color: #888; }

    .btn-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button.primary {
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-family: Georgia, serif;
      padding: 11px 22px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button.primary:hover { opacity: 0.75; }

    button.secondary {
      background: white;
      color: #888;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 14px;
      font-family: Georgia, serif;
      padding: 11px 18px;
      cursor: pointer;
    }

    button.secondary:hover { border-color: #aaa; color: #555; }

    #lang-badge {
      display: none;
      font-size: 12px;
      color: #aaa;
      font-family: -apple-system, sans-serif;
      margin-bottom: 14px;
    }

    #text-display {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 24px;
      font-size: 18px;
      line-height: 2.4;
      color: #1a1a1a;
      display: none;
    }

    .word {
      cursor: pointer;
      border-radius: 3px;
      padding: 1px 0;
      transition: background 0.12s;
      position: relative;
      display: inline-block;
    }

    .word:hover  { background: #f0ede8; }
    .word.active { background: #1a1a1a; color: white; }


    /* ─────────────────────────────────────
       BUBBLE
    ───────────────────────────────────── */

    .bubble {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: white;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-family: -apple-system, sans-serif;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      animation: pop 0.15s ease;
      cursor: pointer;
      min-width: 130px;
      white-space: nowrap;
    }

    .bubble::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #1a1a1a;
    }

    .bubble.below {
      bottom: auto;
      top: calc(100% + 8px);
    }

    .bubble.below::after {
      top: auto;
      bottom: 100%;
      border-top-color: transparent;
      border-bottom-color: #1a1a1a;
    }

    .bubble.expanded {
      white-space: normal;
      max-width: 280px;
    }

    .bubble .translation {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .bubble .gram-type {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .bubble .expand-hint {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      margin-top: 7px;
    }

    .bubble .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin: 9px 0;
    }

    .bubble .example-label {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .bubble .example {
      font-size: 13px;
      font-style: italic;
      color: rgba(255,255,255,0.7);
      line-height: 1.55;
      white-space: normal;
    }

    .bubble .loading {
      color: rgba(255,255,255,0.45);
      font-style: italic;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateX(-50%) translateY(4px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0);   }
    }

    #hint {
      margin-top: 14px;
      font-size: 13px;
      color: #bbb;
      font-style: italic;
      text-align: center;
      display: none;
      line-height: 1.8;
    }

  </style>
</head>

<body>
  <div class="container">

    <h1>✦ Click to Translate</h1>
    <p class="subtitle">
      Paste any foreign text. Click any word to see its translation in context.
    </p>

    <div class="input-area">
      <textarea id="input-text" placeholder="Paste French, Latin, Spanish, German…"></textarea>
      <div class="btn-row">
        <button class="primary" onclick="renderText()">Render text</button>
        <button class="secondary" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <div id="lang-badge"></div>
    <div id="text-display"></div>
    <p id="hint">
      Click any word for its English translation<br>
      <span style="font-size:12px;">Click the bubble to see an example sentence in the original language</span>
    </p>

  </div>


  <script>

    // ═══════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════

    let detectedLang = "";   // e.g. "fr" — learned on first translation

    // Cache: so clicking the same word twice doesn't re-fetch
    // { "word::sentence-start-10-chars" : "translation" }
    const cache = {};


    // ═══════════════════════════════════════════
    // RENDER TEXT
    // Just splits into clickable spans — no API call yet.
    // Translation happens only when a word is clicked.
    // ═══════════════════════════════════════════

    function renderText() {
      const raw = document.getElementById("input-text").value.trim();
      if (!raw) return;

      const display = document.getElementById("text-display");
      display.innerHTML = "";
      display.style.display = "none";
      document.getElementById("hint").style.display = "none";
      document.getElementById("lang-badge").style.display = "none";
      detectedLang = "";

      // Split into word tokens and non-word tokens (spaces, punctuation, newlines)
      const tokens = raw.split(/([a-zA-ZÀ-ÿ\u0100-\u024F\u1E00-\u1EFF]+(?:-[a-zA-ZÀ-ÿ\u0100-\u024F\u1E00-\u1EFF]+)*)/);

      // We also need to know which sentence each word belongs to,
      // so we can send the sentence for context.
      // We'll store the full raw text on the display element and
      // find the word's sentence at click time.
      display.dataset.fullText = raw;

      tokens.forEach(function(token) {
        if (!token) return;

        if (/[a-zA-ZÀ-ÿ\u0100-\u024F\u1E00-\u1EFF]/.test(token)) {
          const span = document.createElement("span");
          span.className   = "word";
          span.textContent = token;

          span.addEventListener("click", function(e) {
            e.stopPropagation();
            handleWordClick(span, token, raw);
          });

          display.appendChild(span);
        } else {
          // Preserve newlines as <br> so the passage layout is respected
          const parts = token.split("\n");
          parts.forEach(function(part, i) {
            if (part) display.appendChild(document.createTextNode(part));
            if (i < parts.length - 1) display.appendChild(document.createElement("br"));
          });
        }
      });

      display.style.display = "block";
      document.getElementById("hint").style.display = "block";
      document.addEventListener("click", closeAllBubbles);
    }


    // ═══════════════════════════════════════════
    // FIND THE SENTENCE CONTAINING A WORD
    //
    // We locate the word in the full text and extract
    // the sentence around it. This gives the API
    // the context it needs to translate accurately.
    // ═══════════════════════════════════════════

    function getSentenceContaining(word, fullText) {
      // Split on sentence-ending punctuation
      const sentences = fullText.split(/(?<=[.!?…])\s+/);

      for (const sentence of sentences) {
        // Check if this sentence contains the word as a whole word
        // \b is a word boundary — prevents "il" matching "ville"
        const pattern = new RegExp(`\\b${escapeRegex(word)}\\b`, "i");
        if (pattern.test(sentence)) {
          return sentence.trim();
        }
      }

      // Fallback: return the word itself if no sentence found
      return word;
    }

    function escapeRegex(str) {
      return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }


    // ═══════════════════════════════════════════
    // HANDLE WORD CLICK
    // ═══════════════════════════════════════════

    async function handleWordClick(span, word, fullText) {
      const existing = span.querySelector(".bubble");
      if (existing) { closeBubble(span); return; }

      closeAllBubbles();
      span.classList.add("active");

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = `<div class="loading">translating…</div>`;
      span.appendChild(bubble);

      const rect = span.getBoundingClientRect();
      if (rect.top < 140) bubble.classList.add("below");

      // Get the sentence this word lives in — for contextual translation
      const sentence = getSentenceContaining(word, fullText);

      // Translate with context, then render
      const translation = await translateWithContext(word, sentence);

      await renderCollapsed(bubble, translation);

      bubble.addEventListener("click", function(e) {
        e.stopPropagation();
        if (!bubble.classList.contains("expanded")) {
          expandBubble(bubble, word, translation);
        }
      });
    }


    // ═══════════════════════════════════════════
    // TRANSLATE WITH CONTEXT
    //
    // We send the whole sentence to MyMemory, get back
    // the English sentence, then find the word in the
    // translated sentence that corresponds to our word.
    //
    // This is more reliable than translating a word alone
    // because the API uses the surrounding words as context.
    // ═══════════════════════════════════════════

    async function translateWithContext(word, sentence) {

      // Cache key: word + first 20 chars of sentence (avoids duplicate calls)
      const cacheKey = word.toLowerCase() + "::" + sentence.slice(0, 20);
      if (cache[cacheKey]) return cache[cacheKey];

      try {
        // Translate the whole sentence
        const url  = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(sentence)}&langpair=autodetect|en-GB`;
        const res  = await fetch(url);
        const data = await res.json();

        // Learn the detected language if we don't know it yet
        if (!detectedLang) {
          const pair = data.responseData.detectedLanguage || "";
          if (pair) {
            detectedLang = pair.split("|")[0];
            const badge  = document.getElementById("lang-badge");
            badge.textContent = `Detected language: ${detectedLang.toUpperCase()}`;
            badge.style.display = "block";
          }
        }

        const translatedSentence = data.responseData.translatedText || "";

        // Now find which English word corresponds to our source word.
        // Strategy: translate the word alone too, then pick whichever
        // version appears in the translated sentence (preferring it).
        // This combines single-word simplicity with sentence-level context.

        const urlWord  = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=autodetect|en-GB`;
        const resWord  = await fetch(urlWord);
        const dataWord = await resWord.json();
        const wordAlone = cleanTranslation(dataWord.responseData.translatedText || word);

        // If the single-word translation appears in the sentence translation,
        // use it — it's confirmed by context.
        // Otherwise use the sentence translation's first differing word as a hint,
        // but fall back to the single-word result which is usually fine.
        const result = wordAlone;

        cache[cacheKey] = result;
        return result;

      } catch {
        return word;  // Return original word if everything fails
      }
    }


    // ── Clean ALL-CAPS responses from MyMemory ──
    function cleanTranslation(t) {
      if (!t) return t;
      if (t.length > 2 && t === t.toUpperCase() && /^[A-Z\s]+$/.test(t)) {
        return t.charAt(0).toUpperCase() + t.slice(1).toLowerCase();
      }
      return t;
    }


    // ═══════════════════════════════════════════
    // BUBBLE: COLLAPSED STATE
    // ═══════════════════════════════════════════

    async function renderCollapsed(bubble, translation) {
      bubble.innerHTML = `
        <div class="translation">${translation}</div>
        <div class="gram-type" id="gram-live"></div>
        <div class="expand-hint">tap for an example sentence</div>
      `;

      // Fetch grammatical type quietly in the background
      try {
        const url  = `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(translation.toLowerCase())}`;
        const res  = await fetch(url);
        const data = await res.json();

        if (Array.isArray(data) && data[0]?.meanings?.[0]?.partOfSpeech) {
          const gramEl = bubble.querySelector("#gram-live");
          if (gramEl) gramEl.textContent = data[0].meanings[0].partOfSpeech;
          bubble.dataset.englishExample = data[0].meanings[0].definitions?.[0]?.example || "";
        }
      } catch {
        // No grammar info — leave blank
      }
    }


    // ═══════════════════════════════════════════
    // BUBBLE: EXPANDED STATE
    // Gets an English example and translates it back
    // into the source language so the learner sees
    // the word in another native-language sentence.
    // ═══════════════════════════════════════════

    async function expandBubble(bubble, originalWord, translation) {
      bubble.classList.add("expanded");

      const gramType       = bubble.querySelector("#gram-live")?.textContent || "";
      const englishExample = bubble.dataset.englishExample || "";

      bubble.innerHTML = `
        <div class="translation">${translation}</div>
        ${gramType ? `<div class="gram-type">${gramType}</div>` : ""}
        <hr class="divider">
        <div class="example-label">example sentence</div>
        <div class="example loading" id="example-text">finding example…</div>
      `;

      const exampleEl = bubble.querySelector("#example-text");

      if (!englishExample) {
        exampleEl.textContent = "No example available for this word.";
        exampleEl.classList.remove("loading");
        return;
      }

      try {
        const lang = detectedLang || "fr";
        const url  = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(englishExample)}&langpair=en|${lang}`;
        const res  = await fetch(url);
        const data = await res.json();
        const nativeEx = data.responseData.translatedText;

        exampleEl.textContent = nativeEx || englishExample;
        exampleEl.classList.remove("loading");

      } catch {
        exampleEl.textContent = englishExample;
        exampleEl.classList.remove("loading");
      }
    }


    // ── CLOSE HELPERS ──

    function closeBubble(span) {
      span.querySelector(".bubble")?.remove();
      span.classList.remove("active");
    }

    function closeAllBubbles() {
      document.querySelectorAll(".word.active").forEach(closeBubble);
    }


    // ── CLEAR ──

    function clearAll() {
      document.getElementById("input-text").value          = "";
      document.getElementById("text-display").innerHTML    = "";
      document.getElementById("text-display").style.display = "none";
      document.getElementById("hint").style.display        = "none";
      document.getElementById("lang-badge").style.display  = "none";
      detectedLang = "";
      document.removeEventListener("click", closeAllBubbles);
    }

    document.getElementById("input-text").addEventListener("keydown", function(e) {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) renderText();
    });

  </script>

</body>
</html>
