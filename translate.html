<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click to Translate</title>

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #f5f3ef;
      min-height: 100vh;
      padding: 40px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 22px;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    p.subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    textarea {
      width: 100%;
      font-family: Georgia, serif;
      font-size: 16px;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      resize: vertical;
      outline: none;
      line-height: 1.6;
      color: #1a1a1a;
      min-height: 130px;
    }

    textarea:focus { border-color: #888; }

    .btn-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button.primary {
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-family: Georgia, serif;
      padding: 11px 22px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button.primary:hover  { opacity: 0.75; }
    button.primary:disabled { opacity: 0.4; cursor: default; }

    button.secondary {
      background: white;
      color: #888;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 14px;
      font-family: Georgia, serif;
      padding: 11px 18px;
      cursor: pointer;
    }

    button.secondary:hover { border-color: #aaa; color: #555; }

    #status {
      font-size: 13px;
      color: #aaa;
      font-style: italic;
      font-family: -apple-system, sans-serif;
    }

    #lang-badge {
      display: none;
      font-size: 12px;
      color: #aaa;
      font-family: -apple-system, sans-serif;
      margin-bottom: 14px;
    }

    #text-display {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 24px;
      font-size: 18px;
      line-height: 2.4;
      color: #1a1a1a;
      display: none;
      position: relative;
    }

    .word {
      cursor: pointer;
      border-radius: 3px;
      padding: 1px 0;
      transition: background 0.12s;
      position: relative;
      display: inline-block;
    }

    .word:hover  { background: #f0ede8; }
    .word.active { background: #1a1a1a; color: white; }


    /* ─────────────────────────────────────
       BUBBLE
    ───────────────────────────────────── */

    .bubble {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: white;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-family: -apple-system, sans-serif;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      animation: pop 0.15s ease;
      cursor: pointer;
      min-width: 130px;
      white-space: nowrap;
    }

    .bubble::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #1a1a1a;
    }

    .bubble.below {
      bottom: auto;
      top: calc(100% + 8px);
    }

    .bubble.below::after {
      top: auto;
      bottom: 100%;
      border-top-color: transparent;
      border-bottom-color: #1a1a1a;
    }

    .bubble.expanded { white-space: normal; max-width: 280px; }

    .bubble .translation {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .bubble .gram-type {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .bubble .expand-hint {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      margin-top: 7px;
      letter-spacing: 0.03em;
    }

    .bubble .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin: 9px 0;
    }

    .bubble .example-label {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .bubble .example {
      font-size: 13px;
      font-style: italic;
      color: rgba(255,255,255,0.7);
      line-height: 1.55;
      white-space: normal;
    }

    .bubble .loading {
      color: rgba(255,255,255,0.45);
      font-style: italic;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateX(-50%) translateY(4px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0);   }
    }


    #hint {
      margin-top: 14px;
      font-size: 13px;
      color: #bbb;
      font-style: italic;
      text-align: center;
      display: none;
      line-height: 1.8;
    }

  </style>
</head>

<body>
  <div class="container">

    <h1>✦ Click to Translate</h1>
    <p class="subtitle">
      Paste any foreign text. The whole passage is translated first for accuracy —
      click any word to reveal its contextual English translation.
    </p>

    <div class="input-area">
      <textarea id="input-text" placeholder="Paste French, Latin, Spanish, German…"></textarea>
      <div class="btn-row">
        <button class="primary" id="render-btn" onclick="renderText()">Render text</button>
        <button class="secondary" onclick="clearAll()">Clear</button>
        <span id="status"></span>
      </div>
    </div>

    <div id="lang-badge"></div>
    <div id="text-display"></div>
    <p id="hint">
      Click any word for its English translation<br>
      <span style="font-size:12px;">Click the bubble to see an example sentence in the original language</span>
    </p>

  </div>


  <script>

    // ═══════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════

    // Instead of trying to map arrays by index (which breaks when
    // word counts differ), we build a lookup dictionary keyed by
    // the lowercase source word. This is far more reliable.
    //
    // wordMap["guerre"] = "war"
    // wordMap["il"]     = "he"  (contextual, from full-passage translation)

    let wordMap      = {};   // { sourceLower: englishTranslation }
    let detectedLang = "";   // e.g. "FR", "LA" — stored for example back-translation


    // ═══════════════════════════════════════════
    // RENDER TEXT
    // ═══════════════════════════════════════════

    async function renderText() {
      const raw = document.getElementById("input-text").value.trim();
      if (!raw) return;

      const btn = document.getElementById("render-btn");
      btn.disabled = true;
      document.getElementById("status").textContent = "Translating…";

      const display = document.getElementById("text-display");
      display.innerHTML  = "";
      display.style.display = "none";
      document.getElementById("hint").style.display = "none";
      document.getElementById("lang-badge").style.display = "none";
      wordMap      = {};
      detectedLang = "";

      try {

        // ── Translate the whole passage ──
        const url  = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(raw)}&langpair=autodetect|en-GB`;
        const res  = await fetch(url);
        const data = await res.json();

        const fullTranslation = data.responseData.translatedText;

        // Detect language
        const pair = data.responseData.detectedLanguage || "";
        if (pair) {
          detectedLang = pair.split("|")[0];          // e.g. "fr"
          const badge  = document.getElementById("lang-badge");
          badge.textContent = `Detected language: ${detectedLang.toUpperCase()}`;
          badge.style.display = "block";
        }

        // ── Build the word map ──
        //
        // We extract words from source and translation in parallel.
        // Where counts match we get a direct positional mapping.
        // Where they don't we still fill gaps by translating
        // individual words on demand (see lookupWord below).

        const srcWords  = extractWords(raw);
        const tgtWords  = extractWords(fullTranslation);

        srcWords.forEach(function(w, i) {
          const key         = w.toLowerCase();
          const translation = tgtWords[i];

          if (translation) {
            // Clean the translation:
            // MyMemory sometimes returns ALL-CAPS when rate-limited or uncertain.
            // If the translation is all caps and more than 2 chars, title-case it.
            wordMap[key] = cleanTranslation(translation);
          }
        });

        // ── Render clickable spans ──
        const tokens = raw.split(/([a-zA-ZÀ-ÿ\u0100-\u024F\u1E00-\u1EFF]+)/);

        tokens.forEach(function(token) {
          if (!token) return;

          if (/[a-zA-ZÀ-ÿ\u0100-\u024F\u1E00-\u1EFF]/.test(token)) {
            const span = document.createElement("span");
            span.className   = "word";
            span.textContent = token;

            const originalWord = token;  // capture for closure
            span.addEventListener("click", function(e) {
              e.stopPropagation();
              handleWordClick(span, originalWord);
            });

            display.appendChild(span);
          } else {
            display.appendChild(document.createTextNode(token));
          }
        });

        display.style.display = "block";
        document.getElementById("hint").style.display = "block";
        document.getElementById("status").textContent = "";

      } catch (err) {
        document.getElementById("status").textContent = "Translation failed — check your connection.";
      }

      btn.disabled = false;
      document.addEventListener("click", closeAllBubbles);
    }


    // ── Clean a translation string ──
    // Handles ALL-CAPS responses from MyMemory's rate limiter
    function cleanTranslation(t) {
      if (!t) return t;
      // If more than 2 chars and all uppercase letters, convert to title case
      if (t.length > 2 && t === t.toUpperCase() && /^[A-Z\s]+$/.test(t)) {
        return t.charAt(0).toUpperCase() + t.slice(1).toLowerCase();
      }
      return t;
    }


    // ── Extract words from a string ──
    function extractWords(text) {
      return text.match(/[a-zA-ZÀ-ÿ\u0100-\u024F\u1E00-\u1EFF]+/g) || [];
    }


    // ── Look up a single word if it wasn't in the passage map ──
    // This is a fallback for words whose index fell out of sync
    async function lookupWord(word) {
      const key = word.toLowerCase();
      if (wordMap[key]) return wordMap[key];

      const lang = detectedLang || "fr";
      const url  = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=${lang}|en-GB`;
      const res  = await fetch(url);
      const data = await res.json();
      const t    = cleanTranslation(data.responseData.translatedText);
      wordMap[key] = t;
      return t;
    }


    // ═══════════════════════════════════════════
    // HANDLE WORD CLICK
    // ═══════════════════════════════════════════

    async function handleWordClick(span, word) {
      const existing = span.querySelector(".bubble");
      if (existing) { closeBubble(span); return; }

      closeAllBubbles();
      span.classList.add("active");

      // Create bubble immediately
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = `<div class="loading">translating…</div>`;
      span.appendChild(bubble);

      // Position above or below
      const rect = span.getBoundingClientRect();
      if (rect.top < 140) bubble.classList.add("below");

      // Get the translation — from map or fresh lookup
      const translation = await lookupWord(word);

      // Render collapsed state
      await renderCollapsed(bubble, word, translation);

      // Clicking the bubble expands it
      bubble.addEventListener("click", function(e) {
        e.stopPropagation();
        if (!bubble.classList.contains("expanded")) {
          expandBubble(bubble, word, translation);
        }
      });
    }


    // ═══════════════════════════════════════════
    // BUBBLE: COLLAPSED STATE
    // Shows translation + grammatical type
    // ═══════════════════════════════════════════

    async function renderCollapsed(bubble, originalWord, translation) {

      // Show translation immediately
      bubble.innerHTML = `
        <div class="translation">${translation}</div>
        <div class="gram-type" id="gram-live"></div>
        <div class="expand-hint">tap for an example sentence</div>
      `;

      // Fetch grammatical type from the English dictionary in the background
      try {
        const url  = `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(translation.toLowerCase())}`;
        const res  = await fetch(url);
        const data = await res.json();

        if (Array.isArray(data) && data[0]?.meanings?.[0]?.partOfSpeech) {
          const gramEl = bubble.querySelector("#gram-live");
          if (gramEl) gramEl.textContent = data[0].meanings[0].partOfSpeech;

          // Cache the English example so we can translate it back later
          bubble.dataset.englishExample = data[0].meanings[0].definitions?.[0]?.example || "";
        }
      } catch {
        // Grammar type unavailable — that's fine, we just leave it blank
      }
    }


    // ═══════════════════════════════════════════
    // BUBBLE: EXPANDED STATE
    // Fetches an English example sentence and translates
    // it BACK into the source language so the learner
    // sees the word used in another native-language context
    // ═══════════════════════════════════════════

    async function expandBubble(bubble, originalWord, translation) {
      bubble.classList.add("expanded");

      const gramType       = bubble.querySelector("#gram-live")?.textContent || "";
      const englishExample = bubble.dataset.englishExample || "";

      // Re-render with loading state for the example
      bubble.innerHTML = `
        <div class="translation">${translation}</div>
        ${gramType ? `<div class="gram-type">${gramType}</div>` : ""}
        <hr class="divider">
        <div class="example-label">example sentence</div>
        <div class="example loading" id="example-text">finding example…</div>
      `;

      const exampleEl = bubble.querySelector("#example-text");

      if (!englishExample) {
        // No English example found — fall back to asking MyMemory for a usage
        // by translating a simple prompt
        exampleEl.textContent = "No example available for this word.";
        exampleEl.classList.remove("loading");
        return;
      }

      // Translate the English example sentence back into the source language
      // so the learner sees it in French / Latin / Spanish etc.
      try {
        const lang     = detectedLang || "fr";
        const url      = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(englishExample)}&langpair=en|${lang}`;
        const res      = await fetch(url);
        const data     = await res.json();
        const nativeEx = data.responseData.translatedText;

        exampleEl.textContent = nativeEx || englishExample;
        exampleEl.classList.remove("loading");

      } catch {
        // If back-translation fails, show the English example as fallback
        exampleEl.textContent = englishExample;
        exampleEl.classList.remove("loading");
      }
    }


    // ── CLOSE HELPERS ──

    function closeBubble(span) {
      span.querySelector(".bubble")?.remove();
      span.classList.remove("active");
    }

    function closeAllBubbles() {
      document.querySelectorAll(".word.active").forEach(closeBubble);
    }


    // ── CLEAR ──

    function clearAll() {
      document.getElementById("input-text").value      = "";
      document.getElementById("text-display").innerHTML = "";
      document.getElementById("text-display").style.display = "none";
      document.getElementById("hint").style.display    = "none";
      document.getElementById("lang-badge").style.display = "none";
      document.getElementById("status").textContent    = "";
      wordMap      = {};
      detectedLang = "";
      document.removeEventListener("click", closeAllBubbles);
    }

    document.getElementById("input-text").addEventListener("keydown", function(e) {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) renderText();
    });

  </script>

</body>
</html>
