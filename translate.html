<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click to Translate</title>

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #f5f3ef;
      min-height: 100vh;
      padding: 40px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 22px;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    p.subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
      line-height: 1.6;
    }


    /* ─────────────────────────────────────
       INPUT AREA
    ───────────────────────────────────── */

    .input-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    textarea {
      width: 100%;
      font-family: Georgia, serif;
      font-size: 16px;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      resize: vertical;
      outline: none;
      line-height: 1.6;
      color: #1a1a1a;
      min-height: 130px;
    }

    textarea:focus { border-color: #888; }

    .btn-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button.primary {
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-family: Georgia, serif;
      padding: 11px 22px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button.primary:hover { opacity: 0.75; }
    button.primary:disabled { opacity: 0.4; cursor: default; }

    button.secondary {
      background: white;
      color: #888;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 14px;
      font-family: Georgia, serif;
      padding: 11px 18px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    button.secondary:hover { border-color: #aaa; color: #555; }

    /* Status message shown while translating */
    #status {
      font-size: 13px;
      color: #aaa;
      font-style: italic;
      font-family: -apple-system, sans-serif;
    }


    /* ─────────────────────────────────────
       LANGUAGE BADGE
    ───────────────────────────────────── */

    #lang-badge {
      display: none;
      font-size: 12px;
      color: #aaa;
      font-family: -apple-system, sans-serif;
      margin-bottom: 14px;
      letter-spacing: 0.04em;
    }


    /* ─────────────────────────────────────
       RENDERED TEXT
    ───────────────────────────────────── */

    #text-display {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 24px;
      font-size: 18px;
      line-height: 2.2;
      color: #1a1a1a;
      display: none;
      position: relative;
    }

    .word {
      cursor: pointer;
      border-radius: 3px;
      padding: 1px 0;
      transition: background 0.12s;
      position: relative;
      display: inline-block;
    }

    .word:hover { background: #f0ede8; }

    .word.active {
      background: #1a1a1a;
      color: white;
    }


    /* ─────────────────────────────────────
       POP-UP BUBBLE
    ───────────────────────────────────── */

    .bubble {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: white;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-family: -apple-system, sans-serif;
      white-space: nowrap;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      animation: pop 0.15s ease;
      cursor: pointer;         /* bubble is itself clickable to expand */
      pointer-events: auto;
      min-width: 120px;
    }

    /* Downward triangle */
    .bubble::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #1a1a1a;
    }

    .bubble.below {
      bottom: auto;
      top: calc(100% + 8px);
    }

    .bubble.below::after {
      top: auto;
      bottom: 100%;
      border-top-color: transparent;
      border-bottom-color: #1a1a1a;
    }

    .bubble .translation {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .bubble .gram-type {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .bubble .loading {
      color: rgba(255,255,255,0.5);
      font-style: italic;
      font-size: 13px;
    }

    /* The expand hint nudge */
    .bubble .expand-hint {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    /* Divider line between collapsed and expanded content */
    .bubble .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin: 9px 0;
    }

    /* The example sentence shown when expanded */
    .bubble .example {
      font-size: 12px;
      font-style: italic;
      color: rgba(255,255,255,0.65);
      line-height: 1.5;
      white-space: normal;     /* allow wrapping in expanded state */
      max-width: 260px;
    }

    .bubble .example-label {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateX(-50%) translateY(4px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Expanded bubble re-runs pop animation */
    .bubble.expanded {
      animation: pop 0.12s ease;
      white-space: normal;
    }


    /* ─────────────────────────────────────
       HINT
    ───────────────────────────────────── */

    #hint {
      margin-top: 14px;
      font-size: 13px;
      color: #bbb;
      font-style: italic;
      text-align: center;
      display: none;
      line-height: 1.7;
    }

  </style>
</head>

<body>
  <div class="container">

    <h1>✦ Click to Translate</h1>
    <p class="subtitle">
      Paste any foreign text. The whole passage is translated first for accuracy,
      then click any word to reveal its contextual translation.
    </p>

    <div class="input-area">
      <textarea
        id="input-text"
        placeholder="Paste French, Latin, Spanish, German… anything."
      ></textarea>

      <div class="btn-row">
        <button class="primary" id="render-btn" onclick="renderText()">Render text</button>
        <button class="secondary" onclick="clearAll()">Clear</button>
        <span id="status"></span>
      </div>
    </div>

    <div id="lang-badge"></div>
    <div id="text-display"></div>
    <p id="hint">
      Click any word to see its contextual translation<br>
      <span style="font-size:12px;">Click the bubble to expand for an example sentence</span>
    </p>

  </div>


  <script>

    // ═══════════════════════════════════════════
    // STATE
    //
    // We store the translated words here once the
    // whole-passage translation comes back.
    // It's an array that mirrors the source words
    // in order, so translatedWords[3] is the
    // translation of sourceWords[3].
    // ═══════════════════════════════════════════

    let translatedWords = [];   // filled after whole-passage translation
    let sourceWords     = [];   // the original words in order


    // ═══════════════════════════════════════════
    // RENDER TEXT
    //
    // 1. Split input into word tokens
    // 2. Send the WHOLE TEXT to the API once
    // 3. Split the translation into word tokens
    // 4. Render clickable spans, each knowing its translation
    // ═══════════════════════════════════════════

    async function renderText() {
      const raw = document.getElementById("input-text").value.trim();
      if (!raw) return;

      // Disable the button and show a status message while we wait
      const btn = document.getElementById("render-btn");
      btn.disabled = true;
      document.getElementById("status").textContent = "Translating…";

      const display = document.getElementById("text-display");
      display.innerHTML = "";
      display.style.display = "none";
      document.getElementById("hint").style.display = "none";
      document.getElementById("lang-badge").style.display = "none";
      translatedWords = [];
      sourceWords     = [];

      try {

        // ── STEP 1: Translate the whole passage ──
        const translateURL  = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(raw)}&langpair=autodetect|en-GB`;
        const translateRes  = await fetch(translateURL);
        const translateData = await translateRes.json();

        const fullTranslation = translateData.responseData.translatedText;

        // Show the detected language badge
        const detectedPair = translateData.responseData.detectedLanguage || "";
        if (detectedPair) {
          const lang = detectedPair.split("|")[0].toUpperCase();
          const badge = document.getElementById("lang-badge");
          badge.textContent = `Detected language: ${lang}`;
          badge.style.display = "block";
        }

        // ── STEP 2: Split source and translation into word arrays ──
        //
        // We extract just the words (no punctuation) from each,
        // keeping them in order so index 0 of source matches index 0
        // of the translation.
        //
        // This isn't a perfect 1:1 map (some words translate to phrases)
        // but it gives strongly contextual results vs. word-by-word lookup.

        sourceWords     = extractWords(raw);
        translatedWords = extractWords(fullTranslation);

        // ── STEP 3: Render the original text with clickable words ──
        //
        // We tokenise the raw text preserving spaces and punctuation,
        // but assign each word its index so we can look up the translation.

        let wordIndex = 0;

        // Split preserving both words and non-words
        const tokens = raw.split(/([a-zA-ZÀ-ÿ\u0100-\u024F\u1E00-\u1EFF]+)/);

        tokens.forEach(function(token) {
          if (!token) return;

          const isWord = /[a-zA-ZÀ-ÿ\u0100-\u024F\u1E00-\u1EFF]/.test(token);

          if (isWord) {
            const span = document.createElement("span");
            span.className = "word";
            span.textContent = token;

            // Capture the current wordIndex in a closure
            // so each span remembers its own index
            const idx = wordIndex;
            span.addEventListener("click", function(e) {
              e.stopPropagation();
              handleWordClick(span, token, idx);
            });

            display.appendChild(span);
            wordIndex++;

          } else {
            display.appendChild(document.createTextNode(token));
          }
        });

        display.style.display = "block";
        document.getElementById("hint").style.display = "block";
        document.getElementById("status").textContent = "";

      } catch (err) {
        document.getElementById("status").textContent = "Translation failed — check your connection.";
      }

      btn.disabled = false;
      document.addEventListener("click", closeAllBubbles);
    }


    // ── Extract just the words from a string, in order ──
    function extractWords(text) {
      return text.match(/[a-zA-ZÀ-ÿ\u0100-\u024F\u1E00-\u1EFF]+/g) || [];
    }


    // ═══════════════════════════════════════════
    // HANDLE WORD CLICK
    // ═══════════════════════════════════════════

    function handleWordClick(span, originalWord, wordIndex) {
      const existing = span.querySelector(".bubble");

      if (existing) {
        closeBubble(span);
        return;
      }

      closeAllBubbles();
      span.classList.add("active");

      // Look up this word's contextual translation from our pre-translated array
      // If the index is within range, use it; otherwise fall back gracefully
      const contextTranslation = translatedWords[wordIndex] || originalWord;

      // Create the bubble immediately with the translation we already have
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      span.appendChild(bubble);

      // Position above or below depending on proximity to top of page
      const rect = span.getBoundingClientRect();
      if (rect.top < 140) bubble.classList.add("below");

      // Render initial (collapsed) state — translation is instant
      // because we already have it from the whole-passage translation
      renderBubbleCollapsed(bubble, contextTranslation, originalWord);

      // Clicking the bubble expands it to show an example sentence
      bubble.addEventListener("click", function(e) {
        e.stopPropagation();
        if (!bubble.classList.contains("expanded")) {
          expandBubble(bubble, contextTranslation);
        }
      });
    }


    // ═══════════════════════════════════════════
    // BUBBLE STATES
    // ═══════════════════════════════════════════

    // We fetch the grammatical type from the dictionary API.
    // We do this after showing the translation so the bubble
    // appears instantly and the type fills in a moment later.

    async function renderBubbleCollapsed(bubble, translation, originalWord) {

      // Show translation immediately
      bubble.innerHTML = `
        <div class="translation">${translation}</div>
        <div class="gram-type" id="gram-live">…</div>
        <div class="expand-hint">tap bubble for example</div>
      `;

      // Fetch grammatical type in the background
      try {
        const dictURL  = `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(translation.toLowerCase())}`;
        const dictRes  = await fetch(dictURL);
        const dictData = await dictRes.json();

        if (Array.isArray(dictData) && dictData[0]?.meanings?.[0]?.partOfSpeech) {
          const gramEl = bubble.querySelector("#gram-live");
          if (gramEl) gramEl.textContent = dictData[0].meanings[0].partOfSpeech;

          // Store the example on the bubble element itself for later
          // so we don't need to fetch again when expanding
          const example = dictData[0].meanings[0].definitions?.[0]?.example || "";
          bubble.dataset.example  = example;
          bubble.dataset.gramType = dictData[0].meanings[0].partOfSpeech;
        } else {
          const gramEl = bubble.querySelector("#gram-live");
          if (gramEl) gramEl.textContent = "";
        }
      } catch {
        const gramEl = bubble.querySelector("#gram-live");
        if (gramEl) gramEl.textContent = "";
      }
    }


    async function expandBubble(bubble, translation) {
      bubble.classList.add("expanded");

      // Use the example we already fetched, or show a loading state
      const existingExample = bubble.dataset.example;
      const gramType        = bubble.dataset.gramType || "";

      // If we already have it, show immediately
      if (existingExample !== undefined) {
        renderBubbleExpanded(bubble, translation, gramType, existingExample);
        return;
      }

      // Otherwise fetch it now
      bubble.innerHTML += `<hr class="divider"><div class="loading" id="example-loading">finding example…</div>`;

      try {
        const dictURL  = `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(translation.toLowerCase())}`;
        const dictRes  = await fetch(dictURL);
        const dictData = await dictRes.json();

        const example = (Array.isArray(dictData) && dictData[0]?.meanings?.[0]?.definitions?.[0]?.example) || "";
        const gram    = (Array.isArray(dictData) && dictData[0]?.meanings?.[0]?.partOfSpeech) || gramType;

        renderBubbleExpanded(bubble, translation, gram, example);

      } catch {
        renderBubbleExpanded(bubble, translation, gramType, "");
      }
    }


    function renderBubbleExpanded(bubble, translation, gramType, example) {
      bubble.innerHTML = `
        <div class="translation">${translation}</div>
        ${gramType ? `<div class="gram-type">${gramType}</div>` : ""}
        <hr class="divider">
        <div class="example-label">example</div>
        <div class="example">${example || "No example available for this word."}</div>
      `;
    }


    // ── CLOSE HELPERS ──

    function closeBubble(span) {
      const bubble = span.querySelector(".bubble");
      if (bubble) bubble.remove();
      span.classList.remove("active");
    }

    function closeAllBubbles() {
      document.querySelectorAll(".word.active").forEach(closeBubble);
    }


    // ── CLEAR ──

    function clearAll() {
      document.getElementById("input-text").value = "";
      document.getElementById("text-display").innerHTML = "";
      document.getElementById("text-display").style.display = "none";
      document.getElementById("hint").style.display = "none";
      document.getElementById("lang-badge").style.display = "none";
      document.getElementById("status").textContent = "";
      translatedWords = [];
      sourceWords     = [];
      document.removeEventListener("click", closeAllBubbles);
    }


    // Cmd/Ctrl+Enter to render
    document.getElementById("input-text").addEventListener("keydown", function(e) {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) renderText();
    });

  </script>

</body>
</html>
