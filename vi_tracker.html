<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Vote Intention Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=M+PLUS+1+Code:wght@100..700&display=swap">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="ticker-wrapper">
    <div class="ticker-content" id="ticker-text">Loading...</div>
  </div>
  <div class="chart-page">
    <h2 class="chart-title">Vote Intention Tracker</h2>
    <p class="chart-subtitle">Six-party vote share over time</p>
    <div class="chart-wrapper">
      <canvas id="pollChart"></canvas>
    </div>
  </div>
  <script>
    fetch('data.json')
      .then(r => r.json())
      .then(data => {
        const parties = [
          { key: 'RFM', color: '#ADD8E6' },
          { key: 'LAB', color: '#E97451' },
          { key: 'CON', color: '#0096FF' },
          { key: 'GRN', color: '#72E972' },
          { key: 'LDM', color: '#FFAC1C' },
          { key: 'SNP', color: '#FFFA5C' }
        ];

        const data_sorted = [...data].reverse();
        const labels = data_sorted.map(d => `${d.pollster} (${d.date})`);

        const datasets = parties.map(party => ({
          label: party.key,
          data: data_sorted.map(d => {
            const found = d.parties.find(p => p.code === party.key);
            return found ? found.pct : null;
          }),
          borderColor: party.color,
          backgroundColor: party.color,
          borderWidth: 2.5,
          pointRadius: 4,
          pointHoverRadius: 6,
          tension: 0,
          spanGaps: true
        }));

        new Chart(document.getElementById('pollChart'), {
          type: 'line',
          data: { labels, datasets },
          options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: {
                labels: {
                  color: '#ffffff',
                  font: { family: 'M PLUS 1 Code', size: 14 },
                  boxWidth: 30,
                  boxHeight: 2,
                  padding: 20,
                  usePointStyle: false
                }
              },
              tooltip: {
                callbacks: {
                  label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}%`
                }
              }
            },
            scales: {
              x: {
                ticks: { display: false },
                grid: { color: 'rgba(255,255,255,0.1)' }
              },
              y: {
                min: 0,
                ticks: {
                  color: '#ffffff',
                  font: { family: 'M PLUS 1 Code', size: 13 },
                  callback: val => val + '%'
                },
                grid: { color: 'rgba(255,255,255,0.1)' }
              }
            }
          }
        });
      });
  </script>
  
  <script>
    fetch('data.json')
      .then(response => response.json())
      .then(data => {
        const ticker = document.getElementById('ticker-text');
    
        const items = data.map(poll => {
          const parties = poll.parties.map(party => {
            const arrow = party.direction === 'up' ? '▲' : party.direction === 'down' ? '▼' : '–';
            const change = party.movement > 0 ? arrow + party.movement : arrow;
            return `${party.code} ${party.pct}% ${change}`;
          }).join('  ');
          return `${poll.pollster} (${poll.date}): ${parties}`;
        }).join('   |   ');
    
        // Set content first, THEN start animation
        ticker.textContent = items;
    
        // Force a reflow so the browser registers the content width before animating
        void ticker.offsetWidth;
    
        // Now apply the animation
        ticker.style.animation = 'ticker-scroll 45s linear infinite';
      })
      .catch(err => console.error('Failed to load data.json:', err));
  </script>
  
</body>
</html>
