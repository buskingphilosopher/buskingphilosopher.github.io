<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Vote Intention Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="chart-page">
    <h2 class="chart-title">Vote Intention Tracker</h2>
    <p class="chart-subtitle">Six-party vote share over time</p>
    <div class="chart-wrapper">
      <canvas id="pollChart"></canvas>
    </div>
  </div>
  <script>
    fetch('data.json')
      .then(r => r.json())
      .then(data => {
        const parties = [
          { key: 'RFM', color: '#12B6CF' },
          { key: 'LAB', color: '#E4003B' },
          { key: 'CON', color: '#0087DC' },
          { key: 'GRN', color: '#02A95B' },
          { key: 'LDM', color: '#FF6400' },
          { key: 'SNP', color: '#FFFF00' }
        ];

        const data_sorted = [...data].reverse();
        const labels = data_sorted.map(d => `${d.pollster} (${d.date})`);

        const datasets = parties.map(party => ({
          label: party.key,
          data: data_sorted.map(d => {
            const found = d.parties.find(p => p.code === party.key);
            return found ? found.pct : null;
          }),
          borderColor: party.color,
          backgroundColor: party.color,
          borderWidth: 2.5,
          pointRadius: 4,
          pointHoverRadius: 6,
          tension: 0,
          spanGaps: true
        }));

        new Chart(document.getElementById('pollChart'), {
          type: 'line',
          data: { labels, datasets },
          options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: {
                labels: {
                  color: '#ffffff',
                  font: { family: 'Playfair Display', size: 14 },
                  boxWidth: 30,
                  boxHeight: 2,
                  padding: 20,
                  usePointStyle: false
                }
              },
              tooltip: {
                callbacks: {
                  label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}%`
                }
              }
            },
            scales: {
              x: {
                ticks: { color: '#ffffff', font: { family: 'Playfair Display', size: 13 } },
                grid: { color: 'rgba(255,255,255,0.1)' }
              },
              y: {
                min: 0,
                ticks: {
                  color: '#ffffff',
                  font: { family: 'Playfair Display', size: 13 },
                  callback: val => val + '%'
                },
                grid: { color: 'rgba(255,255,255,0.1)' }
              }
            }
          }
        });
      });
  </script>
</body>
</html>
